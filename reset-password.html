<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.gstatic.com;
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
        font-src 'self' https://cdnjs.cloudflare.com;
        img-src 'self' data: https:;
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com;
        object-src 'none';
    ">
    <title>Восстановление пароля — Sound Wave Studio</title>
    <meta name="description" content="Восстановите доступ к вашему аккаунту Sound Wave Studio">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 100%;
        }
        .reset-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,46,46,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.2rem;
            color: var(--accent);
        }
        .reset-title {
            font-size: 1.6rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text);
        }
        .reset-subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
            color: #22c55e;
            font-size: 0.95rem;
            display: none;
        }
        .success-message i {
            font-size: 1.2rem;
            margin-bottom: 8px;
            display: block;
        }
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 24px;
            transition: var(--ts);
        }
        .back-link:hover {
            color: var(--accent);
        }
        .timer-info {
            background: rgba(255, 46, 46, 0.1);
            border: 1px solid rgba(255, 46, 46, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            display: none;
        }
        .timer-info i {
            color: var(--accent);
            margin-right: 5px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="reset-container">
    <div class="reset-box">
        <div class="reset-icon">
            <i class="fas fa-key"></i>
        </div>
        
        <h1 class="reset-title">Восстановление пароля</h1>
        <p class="reset-subtitle">
            Введите email вашего аккаунта. Мы отправим вам ссылку для восстановления пароля.
        </p>

        <div id="success-msg" class="success-message">
            <i class="fas fa-check-circle"></i>
            <div id="success-text"></div>
        </div>

        <form id="reset-form">
            <input 
                type="email" 
                id="reset-email" 
                placeholder="Ваш email"
                required
                autocomplete="email"
            >
            
            <button type="submit" class="btn" id="reset-btn" style="width: 100%; margin-bottom: 0;">
                <i class="fas fa-paper-plane"></i>
                Отправить письмо
            </button>
        </form>

        <div id="timer-info" class="timer-info">
            <i class="fas fa-clock"></i>
            Ссылка будет действительна в течение 1 часа
        </div>

        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Вернуться на главную
        </a>
    </div>
</div>

<script type="module" src="js/reset-password.js"></script>

</body>
</html>
