<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUB SQUAD | Команда Озвучки</title>
    <style>
        /* --- Цветовая палитра и Базовые настройки --- */
        :root {
            --bg-color: #0f0f11;
            --surface-color: #1a1a1d;
            --primary-color: #e63946;
            --text-main: #f1faee;
            --text-muted: #8d99ae;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Навигация --- */
        header {
            background-color: rgba(26, 26, 29, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-color);
        }

        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--primary-color); }

        nav ul { list-style: none; display: flex; gap: 20px; }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--primary-color); }

        /* --- Секции --- */
        .section { display: none; padding: 3rem 2rem; animation: fadeIn 0.5s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .center-wrap { text-align: center; margin-bottom: 2rem; }
        h2.section-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* --- Сетки и Карточки --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card {
            background-color: var(--surface-color);
            border-radius: 10px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }
        .card:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(230, 57, 70, 0.2); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-bottom: 3px solid var(--primary-color); }
        .card-info { padding: 15px; }

        /* --- Плеер и Формы --- */
        .player-wrapper {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: 10px;
            margin-top: 1rem;
            text-align: center;
        }
        .iframe-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 20px;
            background: #000;
        }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #121212;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition);
        }
        .btn:hover { opacity: 0.8; box-shadow: 0 0 15px rgba(230, 57, 70, 0.4); }
    </style>
</head>
<body>

        <nav>
            <ul>
                <li><a id="nav-home" class="nav-link active" onclick="switchTab('home')">Тайтлы</a></li>
                <li><a id="nav-team" class="nav-link" onclick="switchTab('team')">Команда</a></li>
                <li><a id="nav-profile" class="nav-link" onclick="switchTab('profile')">Кабинет</a></li>
            </ul>
        </nav>
    </header>

    <main id="home" class="section active">
        <div class="center-wrap"><h2 class="section-title">Наши Релизы</h2></div>
        <div class="grid">
            <div class="card" onclick="openTitlePlayer('Атака Титанов')">
                <img src="https://via.placeholder.com/300x450/1a1a1d/e63946?text=Attack+on+Titan" alt="Обложка">
                <div class="card-info"><b>Атака Титанов</b><br><small>👁 1.2M просмотров</small></div>
            </div>
        </div>
    </main>
