<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --gold: #ffca28; --admin: #3897f0;
            --ts: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; }

        header {
            background: rgba(11, 11, 13, 0.9); backdrop-filter: blur(10px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.4rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 13px; cursor: pointer; }
        nav a.active { color: var(--accent); }

        .section { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Верификация */
        #verify-notice { background: var(--accent); color: white; padding: 10px; text-align: center; font-size: 14px; display: none; }

        /* Сетки */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: var(--ts); cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .card-content { padding: 15px; }

        /* Профиль */
        .profile-layout { display: grid; grid-template-columns: 280px 1fr; gap: 30px; }
        .sidebar { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; height: fit-content; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); margin-bottom: 15px; }
        
        .info-block { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .block-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; color: var(--accent); text-transform: uppercase; }

        /* Админ-панель */
        .admin-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 10px; }
        label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 5px; }

        input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: var(--ts); }
        .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="verify-notice">Ваш Email не подтвержден! Проверьте почту. <button class="btn btn-sec" style="color:white; padding:2px 10px" id="resend-email">Переотправить</button></div>

    <header>
        <div class="logo" onclick="nav('home')">SOUND<span>WAVE</span> STUDIO</div>
        <nav>
            <ul>
                <li><a id="n-home" class="nav-link active" onclick="nav('home')">Релизы</a></li>
                <li><a id="n-team" class="nav-link" onclick="nav('team')">Команда</a></li>
                <li><a id="n-profile" class="nav-link" onclick="nav('profile')">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main id="home" class="section active">
        <div class="container">
            <h2 style="margin-bottom: 30px;">Свежие <span>тайтлы</span></h2>
            <div class="grid" id="titles-list"></div>
        </div>
    </main>

    <main id="player" class="section">
        <div class="container" style="max-width: 900px;">
            <h2 id="pl-name" style="margin-bottom: 20px;">Загрузка...</h2>
            <div style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden;">
                <iframe id="pl-frame" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
            <button class="btn btn-sec" style="margin-top:20px" onclick="nav('home')">Назад</button>
        </div>
    </main>

    <main id="team" class="section">
        <div class="container">
            <h2 style="margin-bottom: 30px;">Голоса <span>SWS</span></h2>
            <div class="grid" id="team-list"></div>
        </div>
    </main>

    <main id="profile" class="section">
        <div class="container">
            
            <div id="auth-ui" style="max-width: 400px; margin: 0 auto; text-align: center;">
                <h3>SWS ID</h3><br>
                <input type="email" id="a-email" placeholder="Email">
                <input type="password" id="a-pass" placeholder="Пароль">
                <button class="btn" style="width:100%" id="btn-login">Войти</button>
                <button class="btn btn-sec" style="width:100%; margin-top:10px" id="btn-reg">Регистрация</button>
            </div>

            <div id="user-ui" class="profile-layout" style="display: none;">
                <aside class="sidebar">
                    <img src="" id="u-ava" class="avatar">
                    <h3 id="u-nick">...</h3>
                    <p id="u-role" style="color:var(--accent); font-size: 12px; font-weight: bold;"></p>
                    <button class="btn btn-sec" style="margin-top:20px; width:100%" id="btn-logout">Выйти</button>
                </aside>

                <div class="main-content">
                    <div class="info-block">
                        <h3 class="block-title">Настройки</h3>
                        <label>Никнейм</label>
                        <input type="text" id="set-nick">
                        <label>URL аватара</label>
                        <input type="text" id="set-ava">
                        <button class="btn" id="save-profile">Сохранить</button>
                    </div>

                    <div id="admin-console" class="info-block" style="display: none; border-color: var(--admin);">
                        <h3 class="block-title" style="color: var(--admin);">Консоль Управления</h3>
                        
                        <div style="margin-bottom: 30px;">
                            <h4 style="margin-bottom:10px">Добавить Тайтл</h4>
                            <div class="admin-form">
                                <input type="text" id="t-name" placeholder="Название">
                                <input type="text" id="t-img" placeholder="Ссылка на постер">
                                <input type="text" id="t-link" placeholder="Ссылка на Kodik/Player" style="grid-column: span 2;">
                            </div>
                            <button class="btn" id="add-title">Опубликовать тайтл</button>
                        </div>

                        <div style="border-top: 1px solid #222; padding-top: 20px;">
                            <h4 style="margin-bottom:10px">Добавить в Команду</h4>
                            <div class="admin-form">
                                <input type="text" id="m-name" placeholder="Никнейм">
                                <input type="text" id="m-role" placeholder="Роль (Дабер, Техник...)">
                                <input type="text" id="m-img" placeholder="Ссылка на фото" style="grid-column: span 2;">
                            </div>
                            <button class="btn" id="add-member">Добавить в состав</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVKjnhK6i6Y7iT-OA24ccRbLKp7EY22Ug",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Навигация
        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home') loadTitles();
            if(id === 'team') loadTeam();
        };

        window.openPlayer = (name, link) => {
            document.getElementById('pl-name').innerText = name;
            document.getElementById('pl-frame').src = link;
            nav('player');
        };

        // --- AUTH ---
        document.getElementById('btn-reg').addEventListener('click', async () => {
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            try {
                const r = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(r.user); // Отправка верификации
                await setDoc(doc(db, "users", r.user.uid), {
                    nickname: email.split('@')[0], role: "user", avatar: ""
                });
                alert("Письмо с подтверждением отправлено на почту!");
            } catch (e) { alert(e.message); }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('a-email').value, document.getElementById('a-pass').value)
                .catch(e => alert("Ошибка входа"));
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
        document.getElementById('resend-email').addEventListener('click', () => sendEmailVerification(auth.currentUser));

        // --- ПРОФИЛЬ И АДМИНКА ---
        onAuthStateChanged(auth, async (user) => {
            const uiAuth = document.getElementById('auth-ui');
            const uiUser = document.getElementById('user-ui');
            const vNotice = document.getElementById('verify-notice');

            if (user) {
                uiAuth.style.display = 'none';
                uiUser.style.display = 'flex';
                vNotice.style.display = user.emailVerified ? 'none' : 'block';
                
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('u-nick').innerText = d.nickname;
                    document.getElementById('u-ava').src = d.avatar || `https://api.dicebear.com/7.x/notionists-neutral/svg?seed=${d.nickname}`;
                    document.getElementById('set-nick').value = d.nickname;
                    document.getElementById('set-ava').value = d.avatar || "";
                    document.getElementById('u-role').innerText = d.role === 'admin' ? "АДМИНИСТРАТОР" : "ЗРИТЕЛЬ SWS";
                    
                    if(d.role === 'admin') document.getElementById('admin-console').style.display = 'block';
                }
            } else {
                uiAuth.style.display = 'block';
                uiUser.style.display = 'none';
                vNotice.style.display = 'none';
            }
        });

        // Сохранение профиля
        document.getElementById('save-profile').addEventListener('click', async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                nickname: document.getElementById('set-nick').value,
                avatar: document.getElementById('set-ava').value
            });
            location.reload();
        });

        // --- ЛОГИКА АДМИНКИ (Firestore Write) ---
        document.getElementById('add-title').addEventListener('click', async () => {
            await addDoc(collection(db, "titles"), {
                name: document.getElementById('t-name').value,
                img: document.getElementById('t-img').value,
                link: document.getElementById('t-link').value,
                date: Date.now()
            });
            alert("Тайтл добавлен!");
        });

        document.getElementById('add-member').addEventListener('click', async () => {
            await addDoc(collection(db, "team"), {
                name: document.getElementById('m-name').value,
                role: document.getElementById('m-role').value,
                img: document.getElementById('m-img').value
            });
            alert("Участник добавлен!");
        });

        // --- ЗАГРУЗКА ДАННЫХ (Firestore Read) ---
        async function loadTitles() {
            const list = document.getElementById('titles-list');
            list.innerHTML = 'Загрузка...';
            const q = query(collection(db, "titles"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="card" onclick="openPlayer('${d.name}', '${d.link}')">
                        <img src="${d.img}">
                        <div class="card-content"><b>${d.name}</b><br><small>Sound Wave Studio</small></div>
                    </div>`;
            });
        }

        async function loadTeam() {
            const list = document.getElementById('team-list');
            list.innerHTML = 'Загрузка...';
            const snap = await getDocs(collection(db, "team"));
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <img src="${d.img}">
                        <div class="card-content"><b>${d.name}</b><br><small>${d.role}</small></div>
                    </div>`;
            });
        }

        // Первичная загрузка
        loadTitles();
    </script>
</body>
</html>
