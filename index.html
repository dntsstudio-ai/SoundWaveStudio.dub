<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0;
            --ts: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        nav ul { display: flex; list-style: none; gap: 5px; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; 
            padding: 8px 16px; border-radius: 8px; transition: var(--ts); cursor: pointer;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--accent); background: rgba(255, 46, 46, 0.1); }

        .section { display: none; padding: 40px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Поиск */
        .search-box { margin-bottom: 30px; position: relative; max-width: 400px; }
        .search-box input { 
            width: 100%; padding: 12px 12px 12px 40px; background: var(--input-bg); 
            border: 1px solid var(--border); color: white; border-radius: 12px; outline: none;
        }
        .search-box::before { content: "🔍"; position: absolute; left: 15px; top: 12px; opacity: 0.5; }

        /* Карточки */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: var(--ts); position: relative; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; display: block; }
        .card-content { padding: 15px; }
        .card-year { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: var(--text-dim); }
        .card-quality { position: absolute; top: 10px; left: 10px; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        /* Плеер */
        .sws-player { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); margin-top: 20px; }
        video { width: 100%; height: 100%; }
        .player-ui { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; display: flex; align-items: center; gap: 15px; opacity: 0; transition: 0.3s; }
        .sws-player:hover .player-ui { opacity: 1; }
        .skip-btn { position: absolute; bottom: 80px; right: 20px; background: rgba(0,0,0,0.8); border: 1px solid var(--accent); color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: none; z-index: 10; font-size: 12px; }

        /* Профиль и Админка */
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: var(--ts); text-transform: uppercase; font-size: 12px; }
        .admin-panel { background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--admin); margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; color: var(--text-dim); font-size: 13px; }
        footer span { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo" id="logo-btn">SOUND<span>WAVE</span> STUDIO</div>
        <nav>
            <ul>
                <li><a id="n-home" class="nav-link active">Релизы</a></li>
                <li><a id="n-team" class="nav-link">Состав</a></li>
                <li><a id="n-profile" class="nav-link">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <h2 style="margin-bottom: 20px;">Свежие <span>релизы</span></h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Поиск по названию...">
            </div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <h2 style="margin-bottom: 30px;">Наша <span>команда</span></h2>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div style="display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 20px;">
                <img id="v-img" style="width: 200px; border-radius: 12px;">
                <div style="flex: 1; min-width: 300px;">
                    <h1 id="v-title"></h1>
                    <p id="v-meta" style="color: var(--text-dim); margin: 10px 0;"></p>
                    <p id="v-desc"></p>
                </div>
            </div>
            <div class="sws-player">
                <video id="v-video"></video>
                <button id="skip-intro" class="skip-btn">ПРОПУСТИТЬ ИНТРО</button>
                <div class="player-ui">
                    <button class="btn" id="p-play">PLAY/PAUSE</button>
                    <button class="btn" id="p-fs">FULLSCREEN</button>
                </div>
            </div>
            <div id="v-nav" style="margin-top: 20px; display: flex; gap: 10px;"></div>
            <button class="btn" style="margin-top: 20px; background: #222;" onclick="showSection('home')">← НАЗАД</button>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width: 400px; margin: 0 auto; text-align: center;">
                <h2 style="margin-bottom: 20px;">Вход в SWS ID</h2>
                <input type="email" id="log-email" placeholder="Email">
                <input type="password" id="log-pass" placeholder="Пароль">
                <button class="btn" style="width: 100%;" id="btn-do-login">Войти</button>
            </div>

            <div id="user-ui" style="display: none;">
                <h1>Добро пожаловать, <span id="user-name" style="color: var(--accent);"></span></h1>
                <button class="btn" style="background: #222; margin-top: 10px;" id="btn-logout">Выйти из аккаунта</button>

                <div id="admin-zone" class="admin-panel" style="display: none;">
                    <h2 style="grid-column: 1/-1; color: var(--admin);">Панель Администратора</h2>
                    <input type="text" id="a-title" placeholder="Название">
                    <select id="a-type">
                        <option value="Аниме">Аниме</option>
                        <option value="Фильм">Фильм</option>
                        <option value="Сериал">Сериал</option>
                    </select>
                    <input type="text" id="a-year" placeholder="Год">
                    <input type="text" id="a-quality" placeholder="Качество (1080p)">
                    <input type="text" id="a-authors" placeholder="Авторы">
                    <input type="number" id="a-ep" placeholder="Серия №">
                    <input type="text" id="a-img" class="full" placeholder="Ссылка на постер (URL)">
                    <input type="text" id="a-video" class="full" placeholder="Ссылка на видео (Drive URL)">
                    <textarea id="a-desc" style="grid-column: 1/-1;" placeholder="Описание"></textarea>
                    <input type="number" id="a-intro" placeholder="Интро до (сек)">
                    <button class="btn" style="grid-column: 1/-1;" id="btn-publish">ОПУБЛИКОВАТЬ РЕЛИЗ</button>
                </div>
            </div>
        </section>
    </main>

    <footer>© 2026 <span>SoundWaveStudio.dub</span></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allProjects = [];

        // --- НАВИГАЦИЯ ---
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'team') renderTeam();
        };

        document.getElementById('n-home').onclick = () => showSection('home');
        document.getElementById('n-team').onclick = () => showSection('team');
        document.getElementById('n-profile').onclick = () => showSection('profile');
        document.getElementById('logo-btn').onclick = () => showSection('home');

        // --- ПЛЕЕР ФУНКЦИИ ---
        const video = document.getElementById('v-video');
        document.getElementById('p-play').onclick = () => video.paused ? video.play() : video.pause();
        document.getElementById('p-fs').onclick = () => {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        };

        // --- ЛОГИКА ГЛАВНОЙ ---
        async function renderHome() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            allProjects = snap.docs.map(d => d.data());
            drawGrid(allProjects);
        }

        function drawGrid(list) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-quality">${p.quality}</div><img src="${p.img}"><div class="card-content"><b>${p.title}</b><div class="card-year">${p.year}</div></div>`;
                card.onclick = () => openProject(p);
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allProjects.filter(p => p.title.toLowerCase().includes(val));
            drawGrid(filtered);
        };

        // --- ПРОСМОТР ---
        async function openProject(p) {
            showSection('view');
            document.getElementById('v-img').src = p.img;
            document.getElementById('v-title').innerText = p.title;
            document.getElementById('v-desc').innerText = p.desc;
            document.getElementById('v-meta').innerText = `${p.type} | ${p.year} | Авторы: ${p.authors}`;
            
            video.src = p.video;
            video.load();

            const skip = document.getElementById('skip-intro');
            video.ontimeupdate = () => {
                if(video.currentTime > 2 && video.currentTime < 10) skip.style.display = 'block';
                else skip.style.display = 'none';
            };
            skip.onclick = () => video.currentTime = p.intro;

            // Серии
            const nav = document.getElementById('v-nav');
            nav.innerHTML = '';
            if(p.type !== 'Фильм') {
                const q = query(collection(db, "projects"), where("title", "==", p.title), orderBy("ep", "asc"));
                const s = await getDocs(q);
                s.forEach(d => {
                    const ep = d.data();
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = `Серия ${ep.ep}`;
                    if(ep.ep === p.ep) b.style.background = 'var(--accent)';
                    else b.style.background = '#333';
                    b.onclick = () => openProject(ep);
                    nav.appendChild(b);
                });
            }
        }

        // --- КОМАНДА ---
        async function renderTeam() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(collection(db, "team"));
            grid.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${m.img}"><div class="card-content"><b>${m.name}</b><br><small>${m.role}</small></div>`;
                grid.appendChild(card);
            });
        }

        // --- АВТОРИЗАЦИЯ ---
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'block';
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    const userData = snap.data();
                    document.getElementById('user-name').innerText = userData.nickname || user.email;
                    if(userData.role === 'admin') document.getElementById('admin-zone').style.display = 'grid';
                }
            } else {
                document.getElementById('auth-ui').style.display = 'block';
                document.getElementById('user-ui').style.display = 'none';
            }
            renderHome();
        });

        document.getElementById('btn-do-login').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value)
                .catch(e => alert("Ошибка: " + e.message));
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        // --- АДМИН ПУБЛИКАЦИЯ ---
        document.getElementById('btn-publish').onclick = async () => {
            const data = {
                title: document.getElementById('a-title').value,
                type: document.getElementById('a-type').value,
                year: document.getElementById('a-year').value,
                quality: document.getElementById('a-quality').value,
                authors: document.getElementById('a-authors').value,
                ep: Number(document.getElementById('a-ep').value) || 1,
                img: document.getElementById('a-img').value,
                video: document.getElementById('a-video').value,
                desc: document.getElementById('a-desc').value,
                intro: Number(document.getElementById('a-intro').value) || 0,
                time: Date.now()
            };
            await addDoc(collection(db, "projects"), data);
            alert("Опубликовано!");
            renderHome();
        };

    </script>
</body>
</html>
