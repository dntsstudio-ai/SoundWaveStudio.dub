<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --gold: #ffca28;
            --ts: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem;}
        .logo span { color: var(--accent); }
        
        nav ul { display: flex; list-style: none; gap: 5px; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; 
            padding: 8px 16px; border-radius: 8px; transition: var(--ts); cursor: pointer;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--accent); background: rgba(255, 46, 46, 0.1); }

        .section { display: none; padding: 30px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: var(--ts); position: relative; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; display: block; }
        .card-content { padding: 15px; }
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; display: block; }
        .card-meta { font-size: 11px; color: var(--text-dim); }

        .del-btn { 
            position: absolute; top: 10px; right: 10px; background: var(--accent); 
            color: white; border: none; padding: 6px 10px; border-radius: 6px; 
            font-size: 10px; font-weight: bold; cursor: pointer; z-index: 20; display: none;
        }

        .view-layout { display: grid; grid-template-columns: 280px 1fr; gap: 30px; margin-bottom: 30px; }
        @media (max-width: 800px) { .view-layout { grid-template-columns: 1fr; text-align: center; } .view-layout img { margin: 0 auto; } }
        .v-poster { width: 100%; border-radius: 20px; border: 1px solid var(--border); }
        .v-title { font-size: 2.5rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
        .v-info-row { margin-bottom: 8px; font-size: 14px; color: var(--text-dim); }
        .v-info-row b { color: var(--text); }
        .v-desc { line-height: 1.8; color: #ccc; margin-top: 20px; white-space: pre-line; border-top: 1px solid var(--border); padding-top: 20px; }

        .video-box { position: relative; width: 100%; background: #000; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); margin-top: 20px; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        .profile-grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        @media (max-width: 850px) { .profile-grid { grid-template-columns: 1fr; } }
        .profile-card { background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--border); text-align: center; height: fit-content; }
        .u-avatar { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--border); margin-bottom: 20px; object-fit: cover; }
        .badge { background: #1a1a1f; border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; font-size: 11px; margin: 3px; display: inline-block; font-weight: 600; }
        .badge.gold { border-color: var(--gold); color: var(--gold); }

        .admin-section { background: rgba(56, 151, 240, 0.05); border: 1px solid var(--admin); padding: 25px; border-radius: 20px; margin-top: 30px; }
        input, select, textarea { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .btn { padding: 14px 28px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: 800; cursor: pointer; transition: var(--ts); text-transform: uppercase; font-size: 12px; }

        footer { padding: 50px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('home')">SOUND<span>WAVE</span> STUDIO</div>
        <nav>
            <ul>
                <li><a id="n-home" class="nav-link active" onclick="showSection('home')">Релизы</a></li>
                <li><a id="n-team" class="nav-link" onclick="showSection('team')">Состав</a></li>
                <li><a id="n-profile" class="nav-link" onclick="showSection('profile')">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <h2 style="margin-bottom: 25px; font-size: 2rem;">Свежие <span>релизы</span></h2>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <h2 style="margin-bottom: 30px;">Команда <span>SWS</span></h2>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div class="view-layout">
                <img id="v-img" class="v-poster">
                <div class="v-details">
                    <h1 id="v-title" class="v-title"></h1>
                    <div class="v-info-row">Тип: <b id="v-type"></b></div>
                    <div class="v-info-row">Год: <b id="v-year"></b></div>
                    <div class="v-info-row">Качество: <b id="v-quality"></b></div>
                    <div class="v-info-row">Авторы: <b id="v-authors"></b></div>
                    <p id="v-desc" class="v-desc"></p>
                </div>
            </div>

            <div class="video-box">
                <iframe id="v-iframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
            </div>

            <div id="v-episodes" style="margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
            <button class="btn" style="margin-top: 40px; background: #1a1a1f;" onclick="showSection('home')">← Назад</button>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width: 400px; margin: 60px auto; background: var(--card-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--border);">
                <h2 style="text-align: center; margin-bottom: 25px;">SWS ID</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" style="width: 100%;" id="btn-login">Войти</button>
                <button class="btn" style="width: 100%; margin-top: 12px; background: #1a1a1f;" id="btn-reg">Регистрация</button>
            </div>

            <div id="user-ui" class="profile-grid" style="display: none;">
                <aside class="profile-card">
                    <img id="u-ava" class="u-avatar">
                    <h2 id="u-nick">...</h2>
                    <div id="u-role-tag" style="font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 20px;"></div>
                    <div style="display: flex; justify-content: space-around; margin: 20px 0;">
                        <div><b id="u-views" style="color: var(--accent);">0</b><br><small>Проектов</small></div>
                        <div><b id="u-regdate" style="color: var(--accent);">--</b><br><small>Дата рег.</small></div>
                    </div>
                    <div id="u-achievements"></div>
                    <button class="btn" style="width: 100%; margin-top: 20px; background: #1a1a1f;" id="btn-logout">Выход</button>
                </aside>

                <div class="profile-main">
                    <div style="background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 30px;">
                        <h3>Настройки</h3>
                        <input type="text" id="set-nick" placeholder="Никнейм">
                        <input type="text" id="set-ava" placeholder="Ссылка на аватар">
                        <button class="btn" id="btn-save-profile">Сохранить</button>
                    </div>

                    <div id="admin-panel" class="admin-section" style="display: none;">
                        <h3 style="color: var(--admin); margin-bottom: 20px;">Панель Администратора</h3>
                        <div style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                            <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px;">
                                <h4>+ Новый релиз</h4>
                                <input type="text" id="ad-title" placeholder="Название">
                                <select id="ad-type" onchange="toggleAdminFields()">
                                    <option value="Фильм">Фильм</option>
                                    <option value="Аниме">Аниме</option>
                                    <option value="Сериал">Сериал</option>
                                </select>
                                <input type="text" id="ad-year" placeholder="Год">
                                <input type="text" id="ad-quality" placeholder="Качество">
                                <input type="text" id="ad-authors" placeholder="Авторы">
                                <div id="ad-serial-box" style="display: none; border-left: 2px solid var(--accent); padding-left: 15px;">
                                    <input type="number" id="ad-ep" placeholder="Серия №">
                                </div>
                                <input type="text" id="ad-img" placeholder="URL постера">
                                <input type="text" id="ad-video" placeholder="Ссылка на Google Drive">
                                <textarea id="ad-desc" placeholder="Описание..."></textarea>
                                <button class="btn" style="background: var(--admin); width: 100%;" id="btn-pub-rel">ОПУБЛИКОВАТЬ</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>© 2026 <span>SoundWaveStudio</span></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let isAdmin = false;

        // Конвертер для IFRAME
        function driveIframe(url) {
            if (!url.includes('drive.google.com')) return url;
            let id = "";
            if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
            else if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
            return `https://drive.google.com/file/d/${id}/preview`;
        }

        window.toggleAdminFields = () => {
            const type = document.getElementById('ad-type').value;
            document.getElementById('ad-serial-box').style.display = (type !== 'Фильм') ? 'block' : 'none';
        };

        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'team') renderTeam();
        };

        async function renderHome() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            grid.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<button class="del-btn" style="display:${isAdmin?'block':'none'}">УДАЛИТЬ</button><img src="${p.img}"><div class="card-content"><span class="card-title">${p.title}</span><span class="card-meta">${p.type} • ${p.year}</span></div>`;
                card.querySelector('img').onclick = () => openProject(p);
                if(isAdmin) card.querySelector('.del-btn').onclick = () => deleteItem('projects', d.id);
                grid.appendChild(card);
            });
        }

        async function openProject(p) {
            showSection('view');
            document.getElementById('v-iframe').src = driveIframe(p.video);
            document.getElementById('v-img').src = p.img;
            document.getElementById('v-title').innerText = p.title;
            document.getElementById('v-type').innerText = p.type;
            document.getElementById('v-year').innerText = p.year;
            document.getElementById('v-quality').innerText = p.quality;
            document.getElementById('v-authors').innerText = p.authors;
            document.getElementById('v-desc').innerText = p.desc;

            const nav = document.getElementById('v-episodes');
            nav.innerHTML = '';
            if(p.type !== 'Фильм') {
                const q = query(collection(db, "projects"), where("title", "==", p.title), orderBy("ep", "asc"));
                const s = await getDocs(q);
                s.forEach(d => {
                    const ep = d.data();
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.style.background = (ep.ep === p.ep) ? 'var(--accent)' : '#1a1a1f';
                    btn.innerText = `Серия ${ep.ep}`;
                    btn.onclick = () => openProject(ep);
                    nav.appendChild(btn);
                });
            }
        }

        async function renderTeam() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';
            const snap = await getDocs(collection(db, "team"));
            snap.forEach(d => {
                const m = d.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<button class="del-btn" style="display:${isAdmin?'block':'none'}">УДАЛИТЬ</button><img src="${m.img}"><div class="card-content"><b>${m.name}</b><br><small>${m.role}</small></div>`;
                if(isAdmin) card.querySelector('.del-btn').onclick = () => deleteItem('team', d.id);
                grid.appendChild(card);
            });
        }

        async function deleteItem(coll, id) {
            if(confirm("Удалить?")) { await deleteDoc(doc(db, coll, id)); location.reload(); }
        }

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'grid';
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    const u = snap.data();
                    isAdmin = u.role === 'admin';
                    document.getElementById('u-nick').innerText = u.nickname;
                    document.getElementById('u-ava').src = u.avatar || `https://api.dicebear.com/7.x/notionists-neutral/svg?seed=${u.nickname}`;
                    document.getElementById('u-views').innerText = u.views || 0;
                    document.getElementById('u-regdate').innerText = u.regDate || "2024";
                    document.getElementById('u-role-tag').innerText = isAdmin ? "АДМИНИСТРАТОР" : "ЗРИТЕЛЬ";
                    if(isAdmin) document.getElementById('admin-panel').style.display = 'block';
                }
            } else {
                document.getElementById('auth-ui').style.display = 'block';
                document.getElementById('user-ui').style.display = 'none';
                isAdmin = false;
            }
            renderHome();
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert("Ошибка"));
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('btn-reg').onclick = async () => {
            const email = document.getElementById('email').value;
            const res = await createUserWithEmailAndPassword(auth, email, document.getElementById('pass').value);
            await setDoc(doc(db, "users", res.user.uid), { nickname: email.split('@')[0], role: "user", regDate: new Date().toLocaleDateString('ru-RU') });
            location.reload();
        };

        document.getElementById('btn-pub-rel').onclick = async () => {
            await addDoc(collection(db, "projects"), {
                title: document.getElementById('ad-title').value,
                type: document.getElementById('ad-type').value,
                year: document.getElementById('ad-year').value,
                quality: document.getElementById('ad-quality').value,
                authors: document.getElementById('ad-authors').value,
                img: document.getElementById('ad-img').value,
                video: document.getElementById('ad-video').value,
                desc: document.getElementById('ad-desc').value,
                ep: Number(document.getElementById('ad-ep').value) || 1,
                time: Date.now()
            });
            alert("Готово!"); renderHome();
        };
    </script>
</body>
</html>
