<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Google Drive Player</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }

        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { font-weight: 900; cursor: pointer; color: var(--text); text-decoration: none; font-size: 1.2rem; }
        .logo span { color: var(--accent); }
        .nav-link { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .nav-link.active { color: var(--accent); }

        .section { display: none; padding: 30px 0; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-year { position: absolute; bottom: 10px; right: 10px; font-size: 11px; color: var(--text-dim); font-weight: bold; }
        .card-quality { position: absolute; top: 10px; left: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }

        /* PLAYER PAGE */
        .proj-content { display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
        .proj-poster { width: 250px; border-radius: 15px; border: 1px solid var(--border); }
        .proj-details { flex: 1; min-width: 300px; }
        .proj-details h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .meta-item { color: var(--text-dim); margin-bottom: 5px; font-size: 14px; }
        .meta-item b { color: var(--text); }

        /* SWS PLAYER */
        .sws-player { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--border); margin-top: 20px; }
        video { width: 100%; height: 100%; }
        
        .controls { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; display: flex; align-items: center; gap: 15px; opacity: 0; transition: 0.3s; }
        .sws-player:hover .controls { opacity: 1; }
        
        .skip-btn { position: absolute; bottom: 80px; right: 20px; background: rgba(0,0,0,0.85); border: 1px solid var(--accent); color: white; padding: 12px 24px; border-radius: 5px; cursor: pointer; display: none; font-weight: bold; z-index: 10; }
        
        .ep-nav { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .btn-ep { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-ep:hover { border-color: var(--accent); color: var(--accent); }

        /* ADMIN */
        .admin-box { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--admin); display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; }
        .btn-pub { background: var(--accent); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        footer { padding: 30px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; font-size: 12px; color: var(--text-dim); }
        footer span { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showSection('home')">SOUND<span>WAVE</span> STUDIO</div>
    <nav>
        <a onclick="showSection('home')" class="nav-link active" id="n-home">Релизы</a>
        <a onclick="showSection('profile')" class="nav-link" id="n-profile">Админка</a>
    </nav>
</header>

<main class="container">
    <section id="home" class="section active">
        <h2 style="margin-bottom: 25px;">Новинки <span>SWS</span></h2>
        <div class="grid" id="main-grid"></div>
    </section>

    <section id="view" class="section">
        <div class="proj-content">
            <img id="v-img" class="proj-poster">
            <div class="proj-details">
                <h1 id="v-title"></h1>
                <div class="meta-item">Тип: <b id="v-type"></b></div>
                <div class="meta-item">Год: <b id="v-year"></b></div>
                <div class="meta-item">Авторы: <b id="v-authors"></b></div>
                <p id="v-desc" style="margin-top:15px;"></p>
            </div>
        </div>

        <div class="sws-player">
            <video id="v-video" controlsList="nodownload"></video>
            <button id="skip-intro" class="skip-btn">ПРОПУСТИТЬ ИНТРО</button>
            <div class="controls">
                <button onclick="document.getElementById('v-video').play()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">▶</button>
                <div style="flex:1; height:4px; background:#333; border-radius:2px;"></div>
                <button onclick="document.getElementById('v-video').requestFullscreen()" style="background:none; border:none; color:white; cursor:pointer;">⛶ Fullscreen</button>
            </div>
        </div>

        <div class="ep-nav" id="v-nav"></div>
    </section>

    <section id="profile" class="section">
        <div id="admin-ui" style="display:none;">
            <h2 style="margin-bottom:20px; color:var(--admin)">Публикация (Google Drive Mode)</h2>
            <div class="admin-box">
                <input type="text" id="a-title" placeholder="Название проекта">
                <select id="a-type">
                    <option value="Аниме">Аниме</option>
                    <option value="Фильм">Фильм</option>
                    <option value="Сериал">Сериал</option>
                </select>
                <input type="text" id="a-year" placeholder="Год">
                <input type="text" id="a-authors" placeholder="Авторы">
                <input type="text" id="a-quality" placeholder="Качество (1080p)">
                <input type="number" id="a-ep" placeholder="Номер серии">
                
                <input type="text" class="full" id="a-link-img" placeholder="Прямая ссылка на обложку (.jpg)">
                <input type="text" class="full" id="a-link-video" placeholder="Ссылка на Google Диск (видео)">
                
                <textarea id="a-desc" class="full" placeholder="Описание"></textarea>
                
                <input type="number" id="a-intro" placeholder="Интро до (сек)">
                <input type="number" id="a-outro" placeholder="Аутро с (сек)">
                
                <button class="btn-pub full" id="btn-save">ОПУБЛИКОВАТЬ</button>
            </div>
        </div>
        <div id="auth-msg" style="text-align:center; padding:50px;">Войдите как админ, чтобы видеть эту панель.</div>
    </section>
</main>

<footer>© 2026 <span>SoundWaveStudio.dub</span>. Все права защищены.</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, getDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
        authDomain: "my-dub-site.firebaseapp.com",
        projectId: "my-dub-site",
        storageBucket: "my-dub-site.firebasestorage.app",
        messagingSenderId: "302896869866",
        appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- ФУНКЦИЯ ДЛЯ ГУГЛ ДИСКА ---
    function getDriveDirectLink(url) {
        if (!url.includes('drive.google.com')) return url;
        const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
        return `https://docs.google.com/get_video_info?docid=${id}&direct=1`; 
        // Примечание: Google часто блокирует прямые запросы, если видео тяжелое. 
        // Альтернативный надежный метод — https://drive.google.com/uc?export=download&id=${id}
        return `https://drive.google.com/uc?export=download&id=${id}`;
    }

    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home') loadAll();
    };

    // --- ПУБЛИКАЦИЯ ---
    document.getElementById('btn-save').onclick = async () => {
        const data = {
            title: document.getElementById('a-title').value,
            type: document.getElementById('a-type').value,
            year: document.getElementById('a-year').value,
            authors: document.getElementById('a-authors').value,
            quality: document.getElementById('a-quality').value,
            ep: Number(document.getElementById('a-ep').value) || 1,
            img: document.getElementById('a-link-img').value,
            video: getDriveDirectLink(document.getElementById('a-link-video').value),
            desc: document.getElementById('a-desc').value,
            intro: Number(document.getElementById('a-intro').value) || 0,
            outro: Number(document.getElementById('a-outro').value) || 0,
            time: Date.now()
        };
        await addDoc(collection(db, "projects"), data);
        alert("Готово!"); location.reload();
    };

    // --- ЗАГРУЗКА СПИСКА ---
    async function loadAll() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
        snap.forEach(d => {
            const p = d.data();
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-quality">${p.quality}</div>
                <img src="${p.img}">
                <div class="card-info">
                    <b>${p.title}</b> ${p.type === 'Аниме' ? '(Серия '+p.ep+')' : ''}
                    <div class="card-year">${p.year}</div>
                </div>
            `;
            card.onclick = () => openProject(p);
            grid.appendChild(card);
        });
    }

    // --- ОТКРЫТИЕ ПЛЕЕРА ---
    async function openProject(p) {
        showSection('view');
        document.getElementById('v-img').src = p.img;
        document.getElementById('v-title').innerText = p.title;
        document.getElementById('v-type').innerText = p.type;
        document.getElementById('v-year').innerText = p.year;
        document.getElementById('v-authors').innerText = p.authors;
        document.getElementById('v-desc').innerText = p.desc;
        
        const video = document.getElementById('v-video');
        video.src = p.video;

        // Кнопка интро
        const skip = document.getElementById('skip-intro');
        video.ontimeupdate = () => {
            if (video.currentTime > 2 && video.currentTime < 10) skip.style.display = 'block';
            else skip.style.display = 'none';
        };
        skip.onclick = () => video.currentTime = p.intro;

        // Навигация серий (ищем серии того же названия)
        const nav = document.getElementById('v-nav');
        nav.innerHTML = '';
        if(p.type !== 'Фильм') {
            const q = query(collection(db, "projects"), where("title", "==", p.title), orderBy("ep", "asc"));
            const s = await getDocs(q);
            s.forEach(docEp => {
                const epData = docEp.data();
                const btn = document.createElement('button');
                btn.className = 'btn-ep';
                btn.innerText = `Серия ${epData.ep}`;
                if(epData.ep === p.ep) btn.style.borderColor = 'var(--accent)';
                btn.onclick = () => openProject(epData);
                nav.appendChild(btn);
            });
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists() && snap.data().role === 'admin') {
                document.getElementById('admin-ui').style.display = 'block';
                document.getElementById('auth-msg').style.display = 'none';
            }
        }
        loadAll();
    });
</script>
</body>
</html>
