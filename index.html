<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Studio | Официальный сайт</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --ts: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 15px; flex: 1; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; padding: 8px 10px; cursor: pointer; }
        .nav-link.active { color: var(--accent); }

        /* SEARCH & FILTERS */
        .search-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; margin-bottom: 0; }
        .filter-select { width: auto; min-width: 150px; margin-bottom: 0; }

        .section { display: none; padding: 20px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; transition: var(--ts); }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 230px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; font-size: 12px; }
        .genre-tag { font-size: 9px; background: var(--accent); padding: 2px 6px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; font-size: 12px; }
        .btn-blue { background: var(--admin); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        /* FOOTER */
        footer { padding: 40px 0; border-top: 1px solid var(--border); margin-top: 50px; text-align: center; font-size: 13px; color: var(--text-dim); }
        .footer-links { margin-top: 10px; display: flex; justify-content: center; gap: 20px; }
        .footer-links a { color: var(--text-dim); text-decoration: none; transition: 0.2s; }
        .footer-links a:hover { color: var(--accent); }

        /* COMMENTS */
        .comm-item { display: flex; gap: 12px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .comm-ava { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('home')">SOUND<span> WAVE</span> STUDIO</div>
        <nav>
            <a id="n-home" class="nav-link active" onclick="showSection('home')">Релизы</a>
            <a id="n-team" class="nav-link" onclick="showSection('team')">Состав</a>
            <a id="n-profile" class="nav-link" onclick="showSection('profile')">Профиль</a>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <div class="search-bar">
                <input type="text" id="main-search" class="search-input" placeholder="Поиск по названию..." oninput="filterProjects()">
                <select id="filter-genre" class="filter-select" onchange="filterProjects()">
                    <option value="all">Все жанры</option>
                    <option value="Аниме">Аниме</option>
                    <option value="Сериал">Сериалы</option>
                    <option value="Фильм">Фильмы</option>
                    <option value="Мультфильм">Мультфильмы</option>
                </select>
                <select id="filter-sort" class="filter-select" onchange="filterProjects()">
                    <option value="new">Сначала новые</option>
                    <option value="old">Сначала старые</option>
                    <option value="pop">По популярности</option>
                </select>
                <button id="adm-btn-rel" class="btn btn-blue" style="display:none;" onclick="openRelModal()">+ Проект</button>
            </div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Команда</h2>
                <button id="adm-btn-team" class="btn btn-blue" style="display:none;" onclick="openTeamModal()">+ Участник</button>
            </div>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div id="view-content"></div> 
            <div id="comm-container" style="margin-top:30px; background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <h3>Комментарии (<span id="comm-count">0</span>)</h3>
                <div id="comm-form-box" style="margin-top:15px; display:none;">
                    <textarea id="comm-text" placeholder="Ваш комментарий на русском или любом другом языке..." rows="3"></textarea>
                    <button class="btn" onclick="sendComment()">Отправить</button>
                </div>
                <div id="comm-list"></div>
            </div>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width:350px; margin:40px auto; text-align:center;">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" style="width:100%" id="btn-login">Войти</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px;" id="btn-reg">Регистрация</button>
            </div>
            <div id="user-ui" style="display:none; max-width:500px; margin:0 auto; background:var(--card-bg); padding:30px; border-radius:20px; text-align:center; border:1px solid var(--border);">
                <img id="u-ava" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent);">
                <h2 id="u-nick" style="margin-top:10px;"></h2>
                <div id="u-role" style="color:var(--accent); font-size:10px; font-weight:bold; margin-bottom:15px;"></div>
                <div id="u-ach" style="margin-bottom:20px;"></div>
                <button class="btn btn-outline" style="width:100%" onclick="openEditProfile()">Настройки</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; color:var(--accent);" id="btn-logout">Выйти</button>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2024-2026 <b>Sound Wave Studio</b>. Все права защищены.</p>
            <p style="font-size:11px; margin-top:5px; opacity:0.6;">Весь контент предоставлен исключительно для ознакомительного просмотра.</p>
            <div class="footer-links">
                <a href="#">Вконтакте</a>
                <a href="#">Telegram</a>
                <a href="#">Discord</a>
                <a href="#">YouTube</a>
            </div>
        </div>
    </footer>

    <div id="m-rel" class="modal"><div class="modal-content">
        <h3>Параметры публикации</h3>
        <input type="hidden" id="ed-rel-id">
        <input type="text" id="ad-title" placeholder="Название (Русский поддерживается)">
        <select id="ad-genre">
            <option value="Аниме">Аниме</option>
            <option value="Сериал">Сериал</option>
            <option value="Фильм">Фильм</option>
            <option value="Мультфильм">Мультфильм</option>
        </select>
        <input type="text" id="ad-year" placeholder="Год выпуска">
        <input type="text" id="ad-authors" placeholder="Команда (дабберы, технари)">
        <input type="text" id="ad-img" placeholder="URL постера">
        <textarea id="ad-desc" placeholder="Полное описание проекта..." rows="5"></textarea>
        <button class="btn btn-blue" style="width:100%" onclick="saveRel()">Опубликовать / Сохранить</button>
        <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeModals()">Отмена</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // CONFIG (Твой конфиг остается)
        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allProjects = [];
        let isAdmin = false;
        let currentProjId = null;

        // --- ПОИСК И ФИЛЬТРАЦИЯ ---
        window.filterProjects = () => {
            const searchText = document.getElementById('main-search').value.toLowerCase();
            const genre = document.getElementById('filter-genre').value;
            const sort = document.getElementById('filter-sort').value;

            let filtered = allProjects.filter(p => {
                const matchName = p.title.toLowerCase().includes(searchText);
                const matchGenre = (genre === 'all' || p.genre === genre);
                return matchName && matchGenre;
            });

            if (sort === 'new') filtered.sort((a, b) => b.time - a.time);
            if (sort === 'old') filtered.sort((a, b) => a.time - b.time);
            if (sort === 'pop') filtered.sort((a, b) => (b.commCount || 0) - (a.commCount || 0));

            renderGrid(filtered);
        };

        async function renderHome() {
            const snap = await getDocs(collection(db, "projects"));
            allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterProjects();
        }

        function renderGrid(data) {
            const g = document.getElementById('main-grid'); g.innerHTML = '';
            data.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools">
                        <button class="btn-sm btn-blue" onclick="openRelModal('${p.id}')">РЕД</button>
                        <button class="btn-sm" style="background:red" onclick="window.delItem('projects','${p.id}')">УД</button>
                    </div>` : ''}
                    <img src="${p.img}" onclick="viewProj('${p.id}')">
                    <div class="card-info">
                        <span class="genre-tag">${p.genre || 'Релиз'}</span><br>
                        <b>${p.title}</b><br><small>${p.year} • 💬 ${p.commCount || 0}</small>
                    </div>
                `;
                g.appendChild(div);
            });
        }

        // --- КОММЕНТАРИИ (ИСПРАВЛЕНО) ---
        window.viewProj = async (id) => {
            currentProjId = id;
            const d = await getDoc(doc(db, "projects", id));
            const p = d.data();
            // Тут должен быть твой код отрисовки плеера...
            showSection('view');
            // Отрисовка комментов
            renderComments(id);
        };

        async function renderComments(projId) {
            const list = document.getElementById('comm-list'); list.innerHTML = '';
            const snap = await getDocs(query(collection(db, "comments"), where("projId", "==", projId), orderBy("time", "desc")));
            document.getElementById('comm-count').innerText = snap.size;
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="comm-item">
                    <img src="${c.ava || 'https://api.dicebear.com/7.x/identicon/svg'}" class="comm-ava">
                    <div><b>${c.user}</b><p style="font-size:13px; color:#ddd;">${c.text}</p></div>
                </div>`;
            });
        }

        window.sendComment = async () => {
            const text = document.getElementById('comm-text').value;
            if(!text || !auth.currentUser) return;
            
            const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
            await addDoc(collection(db, "comments"), {
                projId: currentProjId,
                user: u.nickname,
                ava: u.avatar || '',
                text: text, // Русский язык сохраняется корректно
                time: Date.now()
            });
            
            // Обновляем счетчик популярности в самом проекте
            await updateDoc(doc(db, "projects", currentProjId), { commCount: increment(1) });
            
            document.getElementById('comm-text').value = '';
            renderComments(currentProjId);
        };

        // --- АДМИНКА (ЖАНРЫ И СОХРАНЕНИЕ) ---
        window.saveRel = async () => {
            const id = document.getElementById('ed-rel-id').value;
            const data = {
                title: document.getElementById('ad-title').value,
                genre: document.getElementById('ad-genre').value,
                year: document.getElementById('ad-year').value,
                authors: document.getElementById('ad-authors').value,
                img: document.getElementById('ad-img').value,
                desc: document.getElementById('ad-desc').value,
                time: Date.now()
            };
            if(id) await updateDoc(doc(db, "projects", id), data);
            else { data.commCount = 0; data.series = []; await addDoc(collection(db, "projects"), data); }
            window.closeModals(); renderHome();
        };

        // ОСТАЛЬНЫЕ ФУНКЦИИ (Auth, Team, Del) аналогичны прошлой версии...
        // Не забудь прописать window.delItem = delItem и т.д.

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('comm-form-box').style.display = 'block';
                const d = await getDoc(doc(db, "users", user.uid));
                if(d.exists() && d.data().role === 'admin') {
                    isAdmin = true;
                    document.getElementById('adm-btn-rel').style.display = 'block';
                    document.getElementById('adm-btn-team').style.display = 'block';
                }
            }
            renderHome();
        });

    </script>
</body>
</html>
