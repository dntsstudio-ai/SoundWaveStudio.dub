<script type="module">

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, getDocs, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- 1. ЗАЩИТА ОТ ВСТРАИВАНИЯ (CLICKJACKING) ---
        if (window.top !== window.self) {
            window.top.location = window.self.location;
        }

        // --- 2. ЖЕСТКАЯ ПРИВЯЗКА К ДОМЕНУ ---
        const ALLOWED_DOMAIN = "dntsstudio-ai.github.io";
        const currentDomain = window.location.hostname;
        // Разрешаем localhost и 127.0.0.1 только для локальной разработки (можешь убрать перед релизом)
        if (currentDomain !== ALLOWED_DOMAIN && currentDomain !== "localhost" && currentDomain !== "127.0.0.1" && currentDomain !== "") {
            document.documentElement.innerHTML = `<div style="background:#0b0b0d;color:#ff2e2e;height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:2rem;text-transform:uppercase;font-weight:900;">Сайт скопирован нелегально. Доступ закрыт.</div>`;
            throw new Error("Критическая ошибка: Выполнение скриптов остановлено из-за несовпадения домена.");
        }

        // --- 3. ЗАЩИТА ОТ XSS (Очистка данных) ---
        const escapeHTML = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDVKjnhK6i6Y7iT-OA24ccRbLKp7EY22Ug",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isAdmin = false;

        // --- НАВИГАЦИЯ ---
        // Убрали из глобального window, теперь функции работают только внутри этого скрипта
        const nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const link = document.getElementById('n-'+id);
            if(link) link.classList.add('active');
            if(id === 'home') renderTitles();
            if(id === 'team') renderTeam();
        };

        const watch = (name, link) => {
            document.getElementById('pl-name').innerText = name;
            document.getElementById('pl-frame').src = link;
            nav('player');
        };

        // Назначаем обработчики навигации вручную, чтобы не выносить nav() в глобальный scope
        document.getElementById('n-home').addEventListener('click', () => nav('home'));
        document.getElementById('n-team').addEventListener('click', () => nav('team'));
        document.getElementById('n-profile').addEventListener('click', () => nav('profile'));
        document.querySelector('.logo').addEventListener('click', () => nav('home'));

        // Обработчик для кнопки "Назад" в плеере
        document.querySelector('#player .btn').addEventListener('click', () => nav('home'));

        // --- АДМИН-ФУНКЦИИ (УДАЛЕНИЕ) ---
        const deleteItem = async (coll, id) => {
            if(!isAdmin) return alert("У вас нет прав!"); // Базовая проверка на клиенте
            if(!confirm("Удалить безвозвратно?")) return;
            try {
                await deleteDoc(doc(db, coll, id));
                coll === 'titles' ? renderTitles() : renderTeam();
            } catch (e) {
                alert("Ошибка удаления! Проверьте правила Firebase.");
            }
        };

        // --- AUTH ---
        document.getElementById('btn-reg').addEventListener('click', async () => {
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            try {
                const r = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(r.user);
                await setDoc(doc(db, "users", r.user.uid), {
                    email: escapeHTML(email), 
                    nickname: escapeHTML(email.split('@')[0]),
                    role: "user", 
                    regDate: new Date().toLocaleDateString('ru-RU'),
                    views: 0, 
                    avatar: "", 
                    achievements: ["🚀 Первооткрыватель"]
                });
                alert("Проверьте почту для подтверждения!");
            } catch (e) { alert("Ошибка: " + e.message); }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            signInWithEmailAndPassword(auth, document.getElementById('a-email').value, document.getElementById('a-pass').value)
                .catch(() => alert("Ошибка входа. Проверьте данные."));
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
        
        document.getElementById('check-verify').addEventListener('click', () => {
            if(auth.currentUser) {
                auth.currentUser.reload().then(() => {
                    if(auth.currentUser.emailVerified) location.reload();
                    else alert("Вы еще не подтвердили почту!");
                });
            }
        });

        // --- РЕНДЕРИНГ ДАННЫХ ---
        async function renderTitles() {
            const grid = document.getElementById('titles-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(query(collection(db, "titles"), orderBy("date", "desc")));
            grid.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                // Используем escapeHTML для защиты от вредоносных скриптов в БД
                const safeName = escapeHTML(item.name);
                const safeImg = escapeHTML(item.img);
                const safeLink = escapeHTML(item.link);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" style="display:${isAdmin?'block':'none'}" data-id="${d.id}">УДАЛИТЬ</button>
                    <img src="${safeImg}" data-name="${safeName}" data-link="${safeLink}">
                    <div class="card-content"><b>${safeName}</b><br><small>SWS Dub</small></div>`;
                
                // Назначаем события безопасно
                if (isAdmin) {
                    card.querySelector('.delete-btn').addEventListener('click', () => deleteItem('titles', d.id));
                }
                card.querySelector('img').addEventListener('click', (e) => watch(e.target.dataset.name, e.target.dataset.link));
                
                grid.appendChild(card);
            });
        }

        async function renderTeam() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(collection(db, "team"));
            grid.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                const safeName = escapeHTML(item.name);
                const safeRole = escapeHTML(item.role);
                const safeImg = escapeHTML(item.img);

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" style="display:${isAdmin?'block':'none'}" data-id="${d.id}">УДАЛИТЬ</button>
                    <img src="${safeImg}">
                    <div class="card-content"><b>${safeName}</b><br><small>${safeRole}</small></div>`;

                if (isAdmin) {
                    card.querySelector('.delete-btn').addEventListener('click', () => deleteItem('team', d.id));
                }
                grid.appendChild(card);
            });
        }

        // --- PROFILE & ADMIN LOGIC ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'grid';
                document.getElementById('verify-notice').style.display = user.emailVerified ? 'none' : 'block';
                
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const d = snap.data();
                    isAdmin = d.role === 'admin';
                    document.getElementById('u-nick').innerText = escapeHTML(d.nickname);
                    document.getElementById('u-ava').src = escapeHTML(d.avatar) || `https://api.dicebear.com/7.x/notionists-neutral/svg?seed=${escapeHTML(d.nickname)}`;
                    document.getElementById('s-views').innerText = escapeHTML(d.views) || 0;
                    document.getElementById('s-date').innerText = escapeHTML(d.regDate) || "--";
                    document.getElementById('u-role-text').innerText = isAdmin ? "ГЛАВНЫЙ АДМИНИСТРАТОР" : "УЧАСТНИК СООБЩЕСТВА";
                    
                    const box = document.getElementById('u-ach-box'); box.innerHTML = '';
                    if(isAdmin) box.innerHTML += `<span class="badge gold">🛡️ Основатель</span>`;
                    d.achievements?.forEach(a => box.innerHTML += `<span class="badge">${escapeHTML(a)}</span>`);

                    if(isAdmin) {
                        document.getElementById('admin-panel').style.display = 'block';
                        renderTitles(); // Перерендерить с кнопками удаления
                    }
                }
            } else {
                document.getElementById('auth-ui').style.display = 'block';
                document.getElementById('user-ui').style.display = 'none';
                isAdmin = false;
            }
        });

        // Сохранение ника и авы
        document.getElementById('save-profile').addEventListener('click', async () => {
            if(!auth.currentUser) return;
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                nickname: escapeHTML(document.getElementById('set-nick').value),
                avatar: escapeHTML(document.getElementById('set-ava').value)
            });
            alert("Сохранено!"); location.reload();
        });

        // --- ADMIN CONSOLE ACTIONS ---
        document.getElementById('add-title').addEventListener('click', async () => {
            if(!isAdmin) return alert("Отказано в доступе");
            await addDoc(collection(db, "titles"), {
                name: escapeHTML(document.getElementById('t-name').value),
                img: escapeHTML(document.getElementById('t-img').value),
                link: escapeHTML(document.getElementById('t-link').value),
                date: Date.now()
            });
            alert("Тайтл добавлен!"); 
            document.getElementById('t-name').value = '';
            document.getElementById('t-img').value = '';
            document.getElementById('t-link').value = '';
            renderTitles();
        });

        document.getElementById('add-member').addEventListener('click', async () => {
            if(!isAdmin) return alert("Отказано в доступе");
            await addDoc(collection(db, "team"), {
                name: escapeHTML(document.getElementById('m-name').value),
                role: escapeHTML(document.getElementById('m-role').value),
                img: escapeHTML(document.getElementById('m-img').value)
            });
            alert("Участник добавлен!");
            document.getElementById('m-name').value = '';
            document.getElementById('m-role').value = '';
            document.getElementById('m-img').value = '';
        });
                                       </script>
