<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --ts: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; }
        .logo span { color: var(--accent); }
        
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; padding: 8px 12px; cursor: pointer; transition: var(--ts); }
        .nav-link.active { color: var(--accent); }

        .section { display: none; padding: 20px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .card img { width: 100%; height: 240px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 12px; font-size: 13px; }

        /* MODAL WINDOWS */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: var(--card-bg); width: 100%; max-width: 500px; padding: 25px; 
            border-radius: 20px; border: 1px solid var(--border); position: relative; max-height: 90vh; overflow-y: auto;
        }

        /* PLAYER & CONTROLS */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin: 20px 0; border: 1px solid var(--border); }
        iframe { width: 100%; height: 100%; border: none; }
        .player-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }

        /* BUTTONS & FORMS */
        .btn { padding: 12px 20px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; font-size: 12px; transition: var(--ts); display: inline-flex; align-items: center; justify-content: center; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-blue { background: var(--admin); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 10px; margin-bottom: 10px; font-size: 14px; }

        /* ADMIN FLOATING TOOLS */
        .adm-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
        .adm-mini { padding: 4px 8px; font-size: 9px; background: rgba(0,0,0,0.7); border-radius: 4px; color: white; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }

        @media (max-width: 600px) {
            .view-layout { display: block; }
            .v-poster { width: 180px; margin: 0 auto 20px auto; display: block; }
            .v-details { text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('home')">SOUND<span>WAVE</span> STUDIO</div>
        <nav>
            <a id="n-home" class="nav-link active" onclick="showSection('home')">Релизы</a>
            <a id="n-team" class="nav-link" onclick="showSection('team')">Состав</a>
            <a id="n-profile" class="nav-link" onclick="showSection('profile')">Профиль</a>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Релизы</h2>
                <button id="adm-add-rel" class="btn btn-blue" style="display:none;" onclick="openRelModal()">+ Добавить</button>
            </div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>Команда</h2>
                <button id="adm-add-team" class="btn btn-blue" style="display:none;" onclick="openTeamModal()">+ Добавить</button>
            </div>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div class="view-layout" style="display: flex; gap: 25px;">
                <img id="v-img" class="v-poster" style="width: 220px; border-radius: 15px; border: 1px solid var(--border);">
                <div class="v-details">
                    <h1 id="v-title" style="margin-bottom: 10px;"></h1>
                    <p id="v-meta" style="color: var(--text-dim); margin-bottom: 15px; font-size: 14px;"></p>
                    <p id="v-desc" style="font-size: 14px; line-height: 1.5; opacity: 0.8;"></p>
                    <div id="adm-project-tools" style="margin-top: 15px; display: none;">
                        <button class="btn btn-blue" onclick="addSeriesToCurrent()">+ Добавить серию</button>
                    </div>
                </div>
            </div>

            <div class="video-box"><iframe id="v-iframe" allowfullscreen></iframe></div>
            
            <div class="player-nav">
                <button id="btn-prev" class="btn btn-outline" onclick="changeEp(-1)">← Назад</button>
                <span id="v-ep-num" style="align-self:center; font-weight:bold;">Серия 1</span>
                <button id="btn-next" class="btn btn-outline" onclick="changeEp(1)">Вперед →</button>
            </div>

            <div id="v-series-grid" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; border-top: 1px solid var(--border); padding-top: 20px;"></div>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width: 350px; margin: 40px auto; text-align: center;">
                <h2 style="margin-bottom: 20px;">Вход</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" style="width:100%" id="btn-login">Войти</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px;" id="btn-reg">Регистрация</button>
            </div>

            <div id="user-ui" style="display:none; max-width: 600px; margin: 0 auto;">
                <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--border);">
                    <img id="u-ava" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px;">
                    <h2 id="u-nick"></h2>
                    <div id="u-role" style="color: var(--accent); font-size: 11px; font-weight: 800; margin-top: 5px;"></div>
                    <div id="u-ach" style="margin-top: 15px;"></div>
                    
                    <div style="margin-top: 25px; text-align: left; border-top: 1px solid var(--border); padding-top: 20px;">
                        <input type="text" id="set-nick" placeholder="Новый ник">
                        <input type="text" id="set-ava" placeholder="URL аватара">
                        <button class="btn btn-blue" style="width: 100%;" id="btn-save-prof">Сохранить данные</button>
                        <button class="btn btn-outline" style="width: 100%; margin-top: 10px;" id="btn-logout">Выйти</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-rel" class="modal">
        <div class="modal-content">
            <h3 id="rel-modal-head">Добавить проект</h3>
            <input type="hidden" id="edit-rel-id">
            <input type="text" id="ad-title" placeholder="Название">
            <select id="ad-type"><option>Аниме</option><option>Сериал</option><option>Фильм</option></select>
            <input type="text" id="ad-year" placeholder="Год">
            <input type="text" id="ad-quality" placeholder="Качество">
            <input type="text" id="ad-authors" placeholder="Авторы">
            <input type="text" id="ad-img" placeholder="URL постера">
            <textarea id="ad-desc" placeholder="Описание..." rows="4"></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-blue" style="flex:1" id="btn-save-rel">Сохранить</button>
                <button class="btn btn-outline" onclick="closeModals()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="modal-team" class="modal">
        <div class="modal-content">
            <h3>Участник команды</h3>
            <input type="hidden" id="edit-team-id">
            <input type="text" id="ad-m-name" placeholder="Никнейм">
            <input type="text" id="ad-m-role" placeholder="Роль">
            <input type="text" id="ad-m-img" placeholder="URL фото">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-blue" style="flex:1" id="btn-save-team">Сохранить</button>
                <button class="btn btn-outline" onclick="closeModals()">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let currentProject = null;
        let currentEpIdx = 0;

        // --- Утилиты ---
        const dLink = (url) => {
            if (!url || !url.includes('drive.google.com')) return url;
            let id = url.includes('/d/') ? url.split('/d/')[1].split('/')[0] : url.split('id=')[1].split('&')[0];
            return `https://drive.google.com/file/d/${id}/preview`;
        };

        window.closeModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); };

        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'team') renderTeam();
        };

        // --- Логика релиза ---
        async function renderHome() {
            const g = document.getElementById('main-grid'); g.innerHTML = '';
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            snap.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools">
                        <button class="adm-mini" onclick="openRelModal('${d.id}')">РЕД</button>
                        <button class="adm-mini" style="color:red" onclick="delItem('projects','${d.id}')">УД</button>
                    </div>` : ''}
                    <img src="${p.img}" onclick="viewProject('${d.id}')">
                    <div class="card-info"><b>${p.title}</b><br><small>${p.type} • ${p.year}</small></div>
                `;
                g.appendChild(div);
            });
        }

        window.openRelModal = async (id = null) => {
            const m = document.getElementById('modal-rel');
            m.style.display = 'flex';
            if(id) {
                const d = await getDoc(doc(db, "projects", id));
                const p = d.data();
                document.getElementById('edit-rel-id').value = id;
                document.getElementById('ad-title').value = p.title;
                document.getElementById('ad-type').value = p.type;
                document.getElementById('ad-year').value = p.year;
                document.getElementById('ad-quality').value = p.quality;
                document.getElementById('ad-authors').value = p.authors;
                document.getElementById('ad-img').value = p.img;
                document.getElementById('ad-desc').value = p.desc;
                document.getElementById('rel-modal-head').innerText = "Редактировать";
            } else {
                document.getElementById('edit-rel-id').value = '';
                document.getElementById('rel-modal-head').innerText = "Новый релиз";
                ['ad-title','ad-year','ad-quality','ad-authors','ad-img','ad-desc'].forEach(i => document.getElementById(i).value = '');
            }
        };

        document.getElementById('btn-save-rel').onclick = async () => {
            const id = document.getElementById('edit-rel-id').value;
            const data = {
                title: document.getElementById('ad-title').value,
                type: document.getElementById('ad-type').value,
                year: document.getElementById('ad-year').value,
                quality: document.getElementById('ad-quality').value,
                authors: document.getElementById('ad-authors').value,
                img: document.getElementById('ad-img').value,
                desc: document.getElementById('ad-desc').value,
                time: Date.now()
            };
            if(id) await updateDoc(doc(db, "projects", id), data);
            else { data.series = []; await addDoc(collection(db, "projects"), data); }
            closeModals(); renderHome();
        };

        // --- Логика плеера ---
        window.viewProject = async (id) => {
            const d = await getDoc(doc(db, "projects", id));
            currentProject = { id: d.id, ...d.data() };
            showSection('view');
            document.getElementById('v-img').src = currentProject.img;
            document.getElementById('v-title').innerText = currentProject.title;
            document.getElementById('v-meta').innerText = `${currentProject.type} | ${currentProject.year} | ${currentProject.authors}`;
            document.getElementById('v-desc').innerText = currentProject.desc;
            document.getElementById('adm-project-tools').style.display = isAdmin ? 'block' : 'none';
            
            currentEpIdx = 0;
            updatePlayer();
        };

        function updatePlayer() {
            const s = currentProject.series || [];
            const epGrid = document.getElementById('v-series-grid');
            epGrid.innerHTML = '';

            if(s.length > 0) {
                const ep = s[currentEpIdx];
                document.getElementById('v-iframe').src = dLink(ep.url);
                document.getElementById('v-ep-num').innerText = `Серия ${ep.num}`;
                
                document.getElementById('btn-prev').disabled = (currentEpIdx === 0);
                document.getElementById('btn-next').disabled = (currentEpIdx === s.length - 1);

                s.forEach((item, idx) => {
                    const b = document.createElement('button');
                    b.className = `btn ${idx === currentEpIdx ? '' : 'btn-outline'}`;
                    b.style.padding = '5px 10px';
                    b.innerText = item.num;
                    b.onclick = () => { currentEpIdx = idx; updatePlayer(); };
                    epGrid.appendChild(b);
                });
            } else {
                document.getElementById('v-iframe').src = '';
                document.getElementById('v-ep-num').innerText = "Серий пока нет";
                document.getElementById('btn-prev').disabled = true;
                document.getElementById('btn-next').disabled = true;
            }
        }

        window.changeEp = (dir) => {
            currentEpIdx += dir;
            updatePlayer();
        };

        window.addSeriesToCurrent = async () => {
            const url = prompt("Вставьте ссылку на Google Drive для новой серии:");
            if(!url) return;
            const newNum = (currentProject.series?.length || 0) + 1;
            const newSeries = [...(currentProject.series || []), { num: newNum, url: url }];
            await updateDoc(doc(db, "projects", currentProject.id), { series: newSeries });
            currentProject.series = newSeries;
            updatePlayer();
        };

        // --- Логика команды ---
        async function renderTeam() {
            const g = document.getElementById('team-grid'); g.innerHTML = '';
            const snap = await getDocs(collection(db, "team"));
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools">
                        <button class="adm-mini" onclick="openTeamModal('${d.id}')">РЕД</button>
                        <button class="adm-mini" style="color:red" onclick="delItem('team','${d.id}')">УД</button>
                    </div>` : ''}
                    <img src="${m.img}">
                    <div class="card-info"><b>${m.name}</b><br><small>${m.role}</small></div>
                `;
                g.appendChild(div);
            });
        }

        window.openTeamModal = async (id = null) => {
            document.getElementById('modal-team').style.display = 'flex';
            if(id) {
                const d = await getDoc(doc(db, "team", id));
                const m = d.data();
                document.getElementById('edit-team-id').value = id;
                document.getElementById('ad-m-name').value = m.name;
                document.getElementById('ad-m-role').value = m.role;
                document.getElementById('ad-m-img').value = m.img;
            } else {
                document.getElementById('edit-team-id').value = '';
                ['ad-m-name','ad-m-role','ad-m-img'].forEach(i => document.getElementById(i).value = '');
            }
        };

        document.getElementById('btn-save-team').onclick = async () => {
            const id = document.getElementById('edit-team-id').value;
            const data = {
                name: document.getElementById('ad-m-name').value,
                role: document.getElementById('ad-m-role').value,
                img: document.getElementById('ad-m-img').value
            };
            if(id) await updateDoc(doc(db, "team", id), data);
            else await addDoc(collection(db, "team"), data);
            closeModals(); renderTeam();
        };

        window.delItem = async (col, id) => { if(confirm("Удалить?")) { await deleteDoc(doc(db, col, id)); location.reload(); } };

        // --- Аутентификация ---
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'block';
                const d = await getDoc(doc(db, "users", user.uid));
                if(d.exists()) {
                    const u = d.data();
                    isAdmin = u.role === 'admin';
                    document.getElementById('u-nick').innerText = u.nickname;
                    document.getElementById('u-ava').src = u.avatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${u.nickname}`;
                    document.getElementById('u-role').innerText = isAdmin ? "АДМИНИСТРАТОР" : "ЗРИТЕЛЬ";
                    if(isAdmin) {
                        document.getElementById('adm-add-rel').style.display = 'block';
                        document.getElementById('adm-add-team').style.display = 'block';
                    }
                }
            }
            renderHome();
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert("Ошибка входа"));
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('btn-save-prof').onclick = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                nickname: document.getElementById('set-nick').value,
                avatar: document.getElementById('set-ava').value
            });
            location.reload();
        };
        
        document.getElementById('btn-reg').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            const re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@#$%^&+=!]).{6,16}$/;
            if(!re.test(p)) return alert("Пароль не соответствует требованиям безопасности!");
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { email: e, nickname: e.split('@')[0], role: "user", achievements: [] });
            location.reload();
        };

    </script>
</body>
</html>
