<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Studio | My Dubside</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507; --card-bg: #0c0c0e; --accent: #ff2e2e; 
            --text: #ffffff; --text-dim: #666; --border: #1a1a1e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 46, 46, 0.05) 0%, transparent 50%),
            url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' fill='%23ff2e2e' opacity='0.03' font-size='20'%3EX%3C/text%3E%3Ctext x='150' y='80' fill='%23ffffff' opacity='0.02' font-size='15'%3EO%3C/text%3E%3Ctext x='300' y='40' fill='%23ff2e2e' opacity='0.03' font-size='25'%3EØ%3C/text%3E%3Ctext x='50' y='250' fill='%23ffffff' opacity='0.02' font-size='12'%3ESWS%3C/text%3E%3C/svg%3E");
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        header { padding: 20px 0; position: sticky; top: 0; z-index: 1000; background: rgba(5,5,7,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .logo span { color: var(--accent); }
        .nav-menu { display: flex; gap: 25px; align-items: center; }
        .nav-item { font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .auth-btn { background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 6px; font-weight: 800; font-size: 11px; border: none; cursor: pointer; }
        .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 40px 0; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 16px; font-weight: 800; margin-top: 5px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; }
        input, textarea, select { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 15px; }
        .btn-primary { background: var(--accent); color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; }
        .hidden { display: none !important; }
        footer { border-top: 1px solid var(--border); padding: 60px 0; margin-top: 100px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="container nav-flex">
        <div class="logo" onclick="navigate('home')">SOUND WAVE <span>STUDIO</span></div>
        <nav class="nav-menu">
            <div class="nav-item active" data-page="home" onclick="navigate('home')">Релизы</div>
            <div class="nav-item" data-page="team" onclick="navigate('team')">Команда</div>
            <div class="nav-item" data-page="dubin" onclick="navigate('dubin')">DUB-IN</div>
            <div id="admin-nav" class="nav-item hidden" onclick="navigate('admin')">ADMIN</div>
            <div id="auth-section"></div>
        </nav>
    </div>
</header>

<main id="app">
    <section id="s-home" class="page container">
        <div style="padding: 60px 0; text-align: center;">
            <h1 style="font-size: 32px; font-weight: 800;">ГЛАВНЫЕ <span style="color:var(--accent)">РЕЛИЗЫ</span></h1>
            <input type="text" id="main-search" placeholder="Поиск по названию..." style="max-width: 500px; margin-top: 20px;">
        </div>
        <div id="releases-grid" class="releases-grid"></div>
    </section>

    <section id="s-view" class="page container hidden">
        <div id="view-content" style="padding: 40px 0;"></div>
    </section>

    <section id="s-team" class="page container hidden">
        <h1 style="text-align: center; padding: 60px 0;">НАША <span style="color:var(--accent)">КОМАНДА</span></h1>
        <div id="team-list" class="releases-grid"></div>
    </section>

    <section id="s-dubin" class="page container hidden">
        <div style="max-width: 600px; margin: 100px auto; background: var(--card-bg); padding: 40px; border-radius: 20px;">
            <h2 style="margin-bottom: 20px;">ОСТАВИТЬ ЗАЯВКУ</h2>
            <input type="text" id="dub-title" placeholder="Название тайтла">
            <textarea id="dub-text" placeholder="Ваши комментарии..." style="height: 100px;"></textarea>
            <button class="btn-primary" onclick="submitDubRequest()">ОТПРАВИТЬ</button>
        </div>
    </section>

    <section id="s-admin" class="page container hidden">
        <div style="padding: 40px 0; display: flex; justify-content: space-between;">
            <h2>ADMIN PANEL</h2>
            <div style="display: flex; gap: 10px;">
                <button class="auth-btn" onclick="openModal('m-add-release')">Добавить релиз</button>
                <button class="auth-btn" style="background: #333;" onclick="openModal('m-add-team')">Добавить юнит</button>
            </div>
        </div>
        <div id="admin-releases-list"></div>
    </section>

    <section id="s-profile" class="page container hidden">
        <div id="profile-area" style="padding: 100px 0;"></div>
    </section>
</main>

<footer>
    <div class="container">
        <div class="logo" style="margin-bottom: 20px;">SOUND WAVE <span>STUDIO</span></div>
        <p style="font-size: 10px; color: var(--text-dim);">© 2026 MY DUBSIDE ENGINE. ALL RIGHTS RESERVED.</p>
    </div>
</footer>

<div id="m-auth" class="modal" onclick="closeModalOnDim(event, 'm-auth')">
    <div class="modal-content">
        <h2 id="auth-title" style="text-align: center; margin-bottom: 20px;">ВХОД</h2>
        <input type="email" id="auth-email" placeholder="EMAIL">
        <input type="password" id="auth-pass" placeholder="PASSWORD">
        <button class="btn-primary" id="auth-main-btn" onclick="handleAuth()">ВОЙТИ</button>
        <p onclick="toggleAuthMode()" id="auth-switch" style="text-align: center; margin-top: 15px; font-size: 12px; cursor: pointer;">НЕТ АККАУНТА?</p>
    </div>
</div>

<div id="m-add-release" class="modal" onclick="closeModalOnDim(event, 'm-add-release')">
    <div class="modal-content" style="max-width: 600px;">
        <h2>НОВЫЙ РЕЛИЗ</h2>
        <input type="text" id="rel-title" placeholder="Название">
        <input type="text" id="rel-genre" placeholder="Жанр">
        <input type="text" id="rel-year" placeholder="Год">
        <input type="text" id="rel-img" placeholder="Ссылка на обложку">
        <textarea id="rel-desc" placeholder="Описание"></textarea>
        <textarea id="rel-eps" placeholder="Серия 1|ссылка, Серия 2|ссылка"></textarea>
        <button class="btn-primary" onclick="saveRelease()">СОХРАНИТЬ</button>
    </div>
</div>

<div id="m-add-team" class="modal" onclick="closeModalOnDim(event, 'm-add-team')">
    <div class="modal-content">
        <h2>НОВЫЙ ЮНИТ</h2>
        <input type="text" id="tm-name" placeholder="Никнейм">
        <input type="text" id="tm-role" placeholder="Роль">
        <input type="text" id="tm-ava" placeholder="URL аватара">
        <button class="btn-primary" onclick="saveTeamMember()">ДОБАВИТЬ</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDoc, getDocs, doc, deleteDoc, query, where, orderBy, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "ВАШ_API_KEY", authDomain: "ВАШ_ID.firebaseapp.com", projectId: "ВАШ_ID", storageBucket: "ВАШ_ID.appspot.com", messagingSenderId: "...", appId: "..." };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.state = { user: null, profile: null, role: 'User', isAuth: false, authMode: 'login' };

    window.navigate = (pageId) => {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('s-' + pageId).classList.remove('hidden');
        const navBtn = document.querySelector(`[data-page="${pageId}"]`);
        if (navBtn) navBtn.classList.add('active');
        if (pageId === 'profile') renderProfile();
    };

    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.closeModalOnDim = (e, id) => { if(e.target.id === id) closeModal(id); };

    window.toggleAuthMode = () => {
        state.authMode = state.authMode === 'login' ? 'register' : 'login';
        document.getElementById('auth-title').innerText = state.authMode === 'login' ? 'ВХОД' : 'РЕГИСТРАЦИЯ';
        document.getElementById('auth-main-btn').innerText = state.authMode === 'login' ? 'ВОЙТИ' : 'СОЗДАТЬ';
    };

    window.handleAuth = async () => {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try {
            if (state.authMode === 'login') await signInWithEmailAndPassword(auth, e, p);
            else {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, nick: e.split('@')[0], role: 'User', ava: 'https://api.dicebear.com/7.x/bottts/svg?seed='+res.user.uid });
            }
            closeModal('m-auth');
        } catch (err) { alert(err.message); }
    };

    onAuthStateChanged(auth, async (user) => {
        const area = document.getElementById('auth-section');
        if (user) {
            state.user = user; state.isAuth = true;
            const pSnap = await getDoc(doc(db, "users", user.uid));
            state.profile = pSnap.data();
            state.role = state.profile?.role || 'User';
            if (state.role === 'Admin') document.getElementById('admin-nav').classList.remove('hidden');
            area.innerHTML = `<div style="display:flex; gap:10px; align-items:center;"><span onclick="navigate('profile')" style="cursor:pointer; font-size:11px; font-weight:800;">${state.profile.nick}</span><button class="auth-btn" style="background:#222;" onclick="auth.signOut()">X</button></div>`;
        } else {
            state.user = null; state.isAuth = false; document.getElementById('admin-nav').classList.add('hidden');
            area.innerHTML = `<button class="auth-btn" onclick="openModal('m-auth')">Вход</button>`;
        }
    });

    onSnapshot(collection(db, "releases"), (snap) => {
        const grid = document.getElementById('releases-grid');
        const adminList = document.getElementById('admin-releases-list');
        grid.innerHTML = ""; adminList.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            grid.innerHTML += `<div class="card" onclick="openView('${d.id}')"><img src="${r.img}" class="card-img"><div class="card-body"><div class="card-title">${r.title}</div></div></div>`;
            adminList.innerHTML += `<div style="padding:10px; border-bottom:1px solid #111; display:flex; justify-content:space-between;"><span>${r.title}</span><i class="fas fa-trash" onclick="deleteRelease('${d.id}')" style="color:red; cursor:pointer;"></i></div>`;
        });
    });

    onSnapshot(collection(db, "team"), (snap) => {
        const list = document.getElementById('team-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const m = d.data();
            list.innerHTML += `<div class="card" style="padding:20px; text-align:center;"><img src="${m.ava}" style="width:100px; border-radius:50%; margin-bottom:10px;"><h4>${m.name}</h4><p style="color:red; font-size:10px;">${m.role}</p></div>`;
        });
    });

    window.openView = async (id) => {
        const s = await getDoc(doc(db, "releases", id));
        const r = s.data();
        const content = document.getElementById('view-content');
        navigate('view');
        content.innerHTML = `
            <div style="display:grid; grid-template-columns: 300px 1fr; gap:30px;">
                <img src="${r.img}" style="width:100%; border-radius:15px;">
                <div>
                    <h1>${r.title}</h1><p style="margin:20px 0; color:#888;">${r.desc}</p>
                    <div id="player" style="background:#000; aspect-ratio:16/9; margin-top:20px; display:flex; align-items:center; justify-content:center;">ВЫБЕРИТЕ СЕРИЮ</div>
                    <div style="display:flex; gap:10px; margin-top:20px; overflow-x:auto;" id="ep-list"></div>
                </div>
            </div>`;
        const epList = document.getElementById('ep-list');
        r.episodes?.split(',').forEach(ep => {
            const [name, url] = ep.split('|');
            const btn = document.createElement('button');
            btn.className = "auth-btn"; btn.innerText = name;
            btn.onclick = () => document.getElementById('player').innerHTML = `<iframe src="${url.trim()}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            epList.appendChild(btn);
        });
    };

    window.saveRelease = async () => {
        await addDoc(collection(db, "releases"), { title: document.getElementById('rel-title').value, genre: document.getElementById('rel-genre').value, year: document.getElementById('rel-year').value, img: document.getElementById('rel-img').value, desc: document.getElementById('rel-desc').value, episodes: document.getElementById('rel-eps').value });
        closeModal('m-add-release');
    };

    window.saveTeamMember = async () => {
        await addDoc(collection(db, "team"), { name: document.getElementById('tm-name').value, role: document.getElementById('tm-role').value, ava: document.getElementById('tm-ava').value });
        closeModal('m-add-team');
    };

    window.deleteRelease = async (id) => { if(confirm('Удалить?')) await deleteDoc(doc(db, "releases", id)); };

    window.renderProfile = () => {
        document.getElementById('profile-area').innerHTML = `<div style="text-align:center;"><img src="${state.profile.ava}" style="width:150px; border-radius:20px;"><h2 style="margin-top:20px;">${state.profile.nick}</h2><p>${state.role}</p></div>`;
    };

    window.submitDubRequest = async () => {
        if(!state.isAuth) return openModal('m-auth');
        await addDoc(collection(db, "dub_requests"), { title: document.getElementById('dub-title').value, text: document.getElementById('dub-text').value, user: state.profile.nick });
        alert('Отправлено!');
    };
</script>
</body>
</html>
