<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --ts: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 15px; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; }
        .logo span { color: var(--accent); }
        
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; padding: 8px 10px; cursor: pointer; }
        .nav-link.active { color: var(--accent); }

        .section { display: none; padding: 20px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .card img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; font-size: 12px; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 450px; padding: 20px; border-radius: 16px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 10px; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; font-size: 11px; }
        .btn-blue { background: var(--admin); }
        .btn-outline { background: transparent; border: 1px solid var(--border); }

        /* VIEW PAGE */
        .view-header { display: flex; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .v-poster { width: 180px; border-radius: 10px; }
        @media (max-width: 600px) { .view-header { flex-direction: column; align-items: center; text-align: center; } }
        
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* ADM TOOLS */
        .adm-tools { position: absolute; top: 5px; right: 5px; display: flex; gap: 4px; z-index: 10; }
        .btn-sm { padding: 4px 8px; font-size: 9px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; }

        /* COMMENTS */
        .comm-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .comm-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('home')">SWS<span> STUDIO</span></div>
        <nav>
            <a id="n-home" class="nav-link active" onclick="showSection('home')">Релизы</a>
            <a id="n-team" class="nav-link" onclick="showSection('team')">Состав</a>
            <a id="n-profile" class="nav-link" onclick="showSection('profile')">Профиль</a>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Новинки</h2>
                <button id="adm-btn-rel" class="btn btn-blue" style="display:none;" onclick="openRelModal()">+ Проект</button>
            </div>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Команда SWS</h2>
                <button id="adm-btn-team" class="btn btn-blue" style="display:none;" onclick="openTeamModal()">+ Участник</button>
            </div>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div class="view-header">
                <img id="v-img" class="v-poster">
                <div class="v-details">
                    <h1 id="v-title"></h1>
                    <div id="v-meta" style="color:var(--text-dim); font-size:12px; margin: 10px 0;"></div>
                    <p id="v-desc" style="font-size:13px; opacity:0.8;"></p>
                    <div id="adm-ep-tools" style="margin-top:15px; display:none;">
                        <button class="btn btn-blue" onclick="addSeries()">+ Добавить серию</button>
                    </div>
                </div>
            </div>
            <div class="video-box"><iframe id="v-iframe" allowfullscreen></iframe></div>
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
                <button id="v-prev" class="btn btn-outline" onclick="changeEp(-1)">←</button>
                <span id="v-cur-ep" style="align-self:center; font-weight:bold;">Серия 1</span>
                <button id="v-next" class="btn btn-outline" onclick="changeEp(1)">→</button>
            </div>
            <div id="comm-section" style="background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <h4>Обсуждение</h4>
                <div id="comm-form" style="margin-top:10px; display:none;">
                    <textarea id="comm-text" placeholder="Напишите комментарий..."></textarea>
                    <button class="btn" onclick="sendComment()">Отправить</button>
                </div>
                <div id="comm-list" style="margin-top:15px;"></div>
            </div>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width:350px; margin:40px auto; text-align:center;">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" style="width:100%" id="btn-login">Войти</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px;" id="btn-reg">Регистрация</button>
            </div>
            <div id="user-ui" style="display:none; max-width:500px; margin:0 auto; background:var(--card-bg); padding:30px; border-radius:20px; text-align:center; border:1px solid var(--border);">
                <img id="u-ava" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent);">
                <h2 id="u-nick" style="margin-top:10px;"></h2>
                <div id="u-role" style="color:var(--accent); font-size:10px; font-weight:bold;"></div>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px 0; font-size:12px;">
                    <div><b id="u-views">0</b><br><small>Просмотры</small></div>
                    <div><b id="u-subs">0</b><br><small>Подписчики</small></div>
                </div>
                <div id="u-ach" style="margin-bottom:15px;"></div>
                
                <div id="adm-ach-panel" style="display:none; border-top:1px solid var(--border); padding-top:15px; margin-bottom:15px;">
                    <input type="email" id="ad-ach-email" placeholder="Email пользователя">
                    <input type="text" id="ad-ach-name" placeholder="Название ачивки">
                    <button class="btn btn-blue" style="width:100%" onclick="giveAch()">Выдать ачивку</button>
                </div>

                <button class="btn btn-outline" style="width:100%" onclick="openEditProfile()">Редактировать профиль</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px; color:var(--accent);" id="btn-logout">Выйти</button>
            </div>
        </section>
    </main>

    <div id="m-rel" class="modal"><div class="modal-content">
        <h3 id="m-rel-title">Проект</h3>
        <input type="hidden" id="ed-rel-id">
        <input type="text" id="ad-title" placeholder="Название">
        <input type="text" id="ad-year" placeholder="Год">
        <input type="text" id="ad-quality" placeholder="Качество">
        <input type="text" id="ad-authors" placeholder="Авторы">
        <input type="text" id="ad-img" placeholder="URL постера">
        <textarea id="ad-desc" placeholder="Описание..." rows="4"></textarea>
        <button class="btn btn-blue" style="width:100%" onclick="saveRel()">Сохранить</button>
        <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeModals()">Отмена</button>
    </div></div>

    <div id="m-team" class="modal"><div class="modal-content">
        <h3>Участник команды</h3>
        <input type="hidden" id="ed-team-id">
        <input type="text" id="ad-m-name" placeholder="Никнейм">
        <input type="text" id="ad-m-role" placeholder="Роль">
        <input type="text" id="ad-m-img" placeholder="URL фото">
        <button class="btn btn-blue" style="width:100%" onclick="saveTeam()">Сохранить</button>
        <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeModals()">Отмена</button>
    </div></div>

    <div id="m-prof" class="modal"><div class="modal-content">
        <h3>Настройки профиля</h3>
        <input type="text" id="ed-u-nick" placeholder="Новый ник">
        <input type="text" id="ed-u-ava" placeholder="URL аватара">
        <button class="btn" style="width:100%" onclick="saveProfile()">Обновить</button>
        <button class="btn btn-outline" style="width:100%; margin-top:5px;" onclick="closeModals()">Закрыть</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let curProj = null;
        let curEpIdx = 0;

        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        
        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const nav = document.getElementById('n-'+id); if(nav) nav.classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'team') renderTeam();
        };

        const dLink = (url) => {
            if (!url || !url.includes('drive.google.com')) return url;
            let id = url.includes('/d/') ? url.split('/d/')[1].split('/')[0] : url.split('id=')[1].split('&')[0];
            return `https://drive.google.com/file/d/${id}/preview`;
        };

        // --- ЛОГИКА РЕЛИЗОВ ---
        async function renderHome() {
            const g = document.getElementById('main-grid'); g.innerHTML = '';
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            snap.forEach(d => {
                const p = d.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools">
                        <button class="btn-sm btn-blue" onclick="openRelModal('${d.id}')">РЕД</button>
                        <button class="btn-sm" style="background:red" onclick="delItem('projects','${d.id}')">УД</button>
                    </div>` : ''}
                    <img src="${p.img}" onclick="viewProj('${d.id}')">
                    <div class="card-info"><b>${p.title}</b><br><small>${p.year}</small></div>
                `;
                g.appendChild(div);
            });
        }

        window.openRelModal = async (id = null) => {
            document.getElementById('m-rel').style.display = 'flex';
            document.getElementById('ed-rel-id').value = id || '';
            if(id) {
                const d = await getDoc(doc(db, "projects", id));
                const p = d.data();
                document.getElementById('ad-title').value = p.title;
                document.getElementById('ad-year').value = p.year;
                document.getElementById('ad-quality').value = p.quality || '';
                document.getElementById('ad-authors').value = p.authors || '';
                document.getElementById('ad-img').value = p.img;
                document.getElementById('ad-desc').value = p.desc;
            } else {
                ['ad-title','ad-year','ad-quality','ad-authors','ad-img','ad-desc'].forEach(i => document.getElementById(i).value = '');
            }
        };

        window.saveRel = async () => {
            const id = document.getElementById('ed-rel-id').value;
            const data = {
                title: document.getElementById('ad-title').value,
                year: document.getElementById('ad-year').value,
                quality: document.getElementById('ad-quality').value,
                authors: document.getElementById('ad-authors').value,
                img: document.getElementById('ad-img').value,
                desc: document.getElementById('ad-desc').value,
                time: Date.now()
            };
            if(id) await updateDoc(doc(db, "projects", id), data);
            else { data.series = []; await addDoc(collection(db, "projects"), data); }
            closeModals(); renderHome();
        };

        // --- ЛОГИКА СОСТАВА ---
        async function renderTeam() {
            const g = document.getElementById('team-grid'); g.innerHTML = '';
            const snap = await getDocs(collection(db, "team"));
            snap.forEach(d => {
                const m = d.data();
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${isAdmin ? `<div class="adm-tools">
                        <button class="btn-sm btn-blue" onclick="openTeamModal('${d.id}')">РЕД</button>
                        <button class="btn-sm" style="background:red" onclick="delItem('team','${d.id}')">УД</button>
                    </div>` : ''}
                    <img src="${m.img}">
                    <div class="card-info"><b>${m.name}</b><br><small>${m.role}</small></div>
                `;
                g.appendChild(div);
            });
        }

        window.openTeamModal = async (id = null) => {
            document.getElementById('m-team').style.display = 'flex';
            document.getElementById('ed-team-id').value = id || '';
            if(id) {
                const d = await getDoc(doc(db, "team", id));
                const m = d.data();
                document.getElementById('ad-m-name').value = m.name;
                document.getElementById('ad-m-role').value = m.role;
                document.getElementById('ad-m-img').value = m.img;
            } else {
                ['ad-m-name','ad-m-role','ad-m-img'].forEach(i => document.getElementById(i).value = '');
            }
        };

        window.saveTeam = async () => {
            const id = document.getElementById('ed-team-id').value;
            const data = {
                name: document.getElementById('ad-m-name').value,
                role: document.getElementById('ad-m-role').value,
                img: document.getElementById('ad-m-img').value
            };
            if(id) await updateDoc(doc(db, "team", id), data);
            else await addDoc(collection(db, "team"), data);
            closeModals(); renderTeam();
        };

        window.delItem = async (col, id) => { if(confirm("Удалить?")) { await deleteDoc(doc(db, col, id)); location.reload(); } };

        // --- ПЛЕЕР И КОММЕНТЫ ---
        window.viewProj = async (id) => {
            const d = await getDoc(doc(db, "projects", id));
            curProj = { id: d.id, ...d.data() };
            showSection('view');
            document.getElementById('v-img').src = curProj.img;
            document.getElementById('v-title').innerText = curProj.title;
            document.getElementById('v-desc').innerText = curProj.desc;
            document.getElementById('v-meta').innerText = `${curProj.year} | ${curProj.authors}`;
            document.getElementById('adm-ep-tools').style.display = isAdmin ? 'block' : 'none';
            curEpIdx = 0;
            updatePlayer();
            renderComments();
        };

        function updatePlayer() {
            const s = curProj.series || [];
            if(s.length > 0) {
                document.getElementById('v-iframe').src = dLink(s[curEpIdx].url);
                document.getElementById('v-cur-ep').innerText = `Серия ${s[curEpIdx].num}`;
            } else {
                document.getElementById('v-iframe').src = '';
                document.getElementById('v-cur-ep').innerText = "Нет серий";
            }
        }

        window.changeEp = (dir) => { 
            const s = curProj.series || [];
            const next = curEpIdx + dir;
            if(next >= 0 && next < s.length) { curEpIdx = next; updatePlayer(); }
        };

        window.addSeries = async () => {
            const url = prompt("Ссылка Drive:"); if(!url) return;
            const newS = [...(curProj.series || []), { num: (curProj.series?.length || 0) + 1, url: url }];
            await updateDoc(doc(db, "projects", curProj.id), { series: newS });
            curProj.series = newS; updatePlayer();
        };

        async function renderComments() {
            const list = document.getElementById('comm-list'); list.innerHTML = '';
            const snap = await getDocs(query(collection(db, "comments"), where("projId", "==", curProj.id), orderBy("time", "desc")));
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="comm-item">
                    <img src="${c.ava}" class="comm-ava">
                    <div><b>${c.user}</b><p style="font-size:13px">${c.text}</p></div>
                </div>`;
            });
        }

        window.sendComment = async () => {
            const text = document.getElementById('comm-text').value;
            if(!text || !auth.currentUser) return;
            const u = (await getDoc(doc(db, "users", auth.currentUser.uid))).data();
            await addDoc(collection(db, "comments"), {
                projId: curProj.id, user: u.nickname, ava: u.avatar || '', text: text, time: Date.now()
            });
            document.getElementById('comm-text').value = '';
            renderComments();
        };

        // --- ПРОФИЛЬ ---
        window.openEditProfile = () => document.getElementById('m-prof').style.display = 'flex';
        window.saveProfile = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                nickname: document.getElementById('ed-u-nick').value,
                avatar: document.getElementById('ed-u-ava').value
            });
            location.reload();
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'block';
                document.getElementById('comm-form').style.display = 'block';
                const d = await getDoc(doc(db, "users", user.uid));
                if(d.exists()) {
                    const u = d.data();
                    isAdmin = u.role === 'admin';
                    document.getElementById('u-nick').innerText = u.nickname;
                    document.getElementById('u-ava').src = u.avatar || 'https://api.dicebear.com/7.x/pixel-art/svg?seed=sws';
                    document.getElementById('u-role').innerText = isAdmin ? "АДМИНИСТРАТОР" : "ЗРИТЕЛЬ";
                    document.getElementById('u-views').innerText = u.views || 0;
                    document.getElementById('u-subs').innerText = u.subscribers || 0;
                    if(isAdmin) {
                        document.getElementById('adm-ach-panel').style.display = 'block';
                        document.getElementById('adm-btn-rel').style.display = 'block';
                        document.getElementById('adm-btn-team').style.display = 'block';
                    }
                }
            }
            renderHome();
        });

        document.getElementById('btn-login').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('btn-reg').onclick = async () => {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", res.user.uid), { email: e, nickname: e.split('@')[0], role: "user", views: 0, subscribers: 0, regDate: new Date().toLocaleDateString() });
            location.reload();
        };

        window.giveAch = async () => {
            const email = document.getElementById('ad-ach-email').value;
            const name = document.getElementById('ad-ach-name').value;
            const q = query(collection(db, "users"), where("email", "==", email));
            const snap = await getDocs(q);
            snap.forEach(async d => {
                const achs = d.data().achievements || []; achs.push(name);
                await updateDoc(doc(db, "users", d.id), { achievements: achs });
                alert("Готово!");
            });
        };
    </script>
</body>
</html>
