<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #141417; --input-bg: #050506;
            --accent: #ff2e2e; --text: #ffffff; --text-dim: #9ca3af;
            --border: #252529; --admin: #3897f0; --gold: #ffca28;
            --ts: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 20px; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem;}
        .logo span { color: var(--accent); }
        
        nav ul { display: flex; list-style: none; gap: 5px; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; 
            padding: 8px 16px; border-radius: 8px; transition: var(--ts); cursor: pointer;
        }
        .nav-link:hover { color: var(--text); }
        .nav-link.active { color: var(--accent); background: rgba(255, 46, 46, 0.1); }

        .section { display: none; padding: 40px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Стили карточек и удаления */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: var(--ts); position: relative; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; display: block; }
        .card-content { padding: 15px; }
        
        .del-btn { 
            position: absolute; top: 10px; right: 10px; background: var(--accent); 
            color: white; border: none; padding: 5px 10px; border-radius: 6px; 
            font-size: 10px; font-weight: bold; cursor: pointer; z-index: 20; display: none;
        }

        /* Профиль */
        .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        @media (max-width: 800px) { .profile-layout { grid-template-columns: 1fr; } }
        .sidebar { background: var(--card-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--border); margin-bottom: 15px; object-fit: cover; }
        .badge { background: #1a1a1f; border: 1px solid var(--border); padding: 4px 10px; border-radius: 15px; font-size: 10px; margin: 2px; display: inline-block; }
        .badge.gold { border-color: var(--gold); color: var(--gold); }

        /* Описание проекта */
        .v-description { line-height: 1.8; color: #ccc; font-size: 15px; margin-top: 15px; white-space: pre-line; }

        /* Плеер */
        .video-container { position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; margin-top: 20px; border: 1px solid var(--border); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .player-overlay-btn { position: absolute; bottom: 70px; right: 20px; padding: 10px 20px; background: rgba(0,0,0,0.8); border: 1px solid var(--accent); color: white; border-radius: 8px; cursor: pointer; display: none; }

        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: var(--ts); text-transform: uppercase; font-size: 12px; }
        
        footer { padding: 40px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showSection('home')">SOUND<span>WAVE</span> STUDIO</div>
        <nav>
            <ul>
                <li><a id="n-home" class="nav-link active" onclick="showSection('home')">Релизы</a></li>
                <li><a id="n-team" class="nav-link" onclick="showSection('team')">Состав</a></li>
                <li><a id="n-profile" class="nav-link" onclick="showSection('profile')">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="home" class="section active">
            <h2 style="margin-bottom: 20px;">Свежие <span>релизы</span></h2>
            <div class="grid" id="main-grid"></div>
        </section>

        <section id="team" class="section">
            <h2 style="margin-bottom: 30px;">Команда <span>SWS</span></h2>
            <div class="grid" id="team-grid"></div>
        </section>

        <section id="view" class="section">
            <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                <img id="v-img" style="width: 240px; border-radius: 16px; border: 1px solid var(--border);">
                <div style="flex: 1; min-width: 300px;">
                    <h1 id="v-title" style="font-size: 2.5rem; letter-spacing: -1px;"></h1>
                    <div id="v-meta" style="margin: 10px 0; font-weight: bold; color: var(--accent);"></div>
                    <div id="v-desc" class="v-description"></div>
                </div>
            </div>

            <div class="video-container">
                <video id="main-v" controls></video>
                <button id="skip-i" class="player-overlay-btn">ПРОПУСТИТЬ ИНТРО</button>
            </div>
            
            <div id="v-episodes" style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
            <button class="btn" style="margin-top: 30px; background: #222;" onclick="showSection('home')">← НАЗАД К СПИСКУ</button>
        </section>

        <section id="profile" class="section">
            <div id="auth-ui" style="max-width: 380px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 20px;">SWS ID</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Пароль">
                <button class="btn" style="width: 100%;" id="btn-login">Войти</button>
                <button class="btn" style="width: 100%; margin-top: 10px; background: #222;" id="btn-reg">Создать аккаунт</button>
            </div>

            <div id="user-ui" class="profile-layout" style="display: none;">
                <aside class="sidebar">
                    <img id="u-ava" class="avatar">
                    <h2 id="u-nick">...</h2>
                    <div id="u-role-tag" style="font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 15px;"></div>
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                        <div><b id="u-views" style="color: var(--accent);">0</b><br><small>Проектов</small></div>
                        <div><b id="u-reg" style="color: var(--accent);">--</b><br><small>В SWS</small></div>
                    </div>
                    <div id="u-ach"></div>
                    <button class="btn" style="width: 100%; margin-top: 20px; background: #222;" id="btn-logout">Выйти</button>
                </aside>

                <div class="main-content">
                    <div style="background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border);">
                        <h3>Настройки профиля</h3>
                        <label style="font-size: 12px; color: var(--text-dim);">Никнейм:</label>
                        <input type="text" id="set-nick">
                        <label style="font-size: 12px; color: var(--text-dim);">URL аватара:</label>
                        <input type="text" id="set-ava">
                        <button class="btn" id="btn-save-p">Сохранить</button>
                    </div>

                    <div id="admin-panel" style="display: none; margin-top: 20px; border: 1px solid var(--admin); padding: 25px; border-radius: 20px;">
                        <h3 style="color: var(--admin); margin-bottom: 15px;">Панель управления</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div>
                                <h4>+ Новый релиз</h4>
                                <input type="text" id="ad-title" placeholder="Название">
                                <select id="ad-type"><option>Аниме</option><option>Фильм</option><option>Сериал</option></select>
                                <input type="text" id="ad-img" placeholder="URL постера">
                                <input type="text" id="ad-video" placeholder="URL видео (Drive)">
                                <textarea id="ad-desc" placeholder="Описание"></textarea>
                                <button class="btn" style="background: var(--admin); width: 100%;" id="btn-add-rel">Опубликовать</button>
                            </div>
                            <div>
                                <h4>+ В команду</h4>
                                <input type="text" id="ad-m-name" placeholder="Никнейм">
                                <input type="text" id="ad-m-role" placeholder="Роль">
                                <input type="text" id="ad-m-img" placeholder="URL фото">
                                <button class="btn" style="background: var(--admin); width: 100%;" id="btn-add-mem">Добавить</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>© 2026 <span>SoundWaveStudio.dub</span></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;

        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('n-'+id)) document.getElementById('n-'+id).classList.add('active');
            if(id === 'home') renderHome();
            if(id === 'team') renderTeam();
        };

        // --- ГЛАВНАЯ ---
        async function renderHome() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = 'Загрузка...';
            const snap = await getDocs(query(collection(db, "projects"), orderBy("time", "desc")));
            grid.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="del-btn" style="display:${isAdmin?'block':'none'}">УДАЛИТЬ</button>
                    <img src="${p.img}">
                    <div class="card-content"><b>${p.title}</b></div>
                `;
                card.querySelector('img').onclick = () => openProject(p);
                if(isAdmin) card.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); deleteItem('projects', d.id); };
                grid.appendChild(card);
            });
        }

        async function openProject(p) {
            showSection('view');
            const video = document.getElementById('main-v');
            document.getElementById('v-img').src = p.img;
            document.getElementById('v-title').innerText = p.title;
            document.getElementById('v-meta').innerText = `${p.type} | SWS Dub`;
            document.getElementById('v-desc').innerText = p.desc;
            video.src = p.video;
            video.play().catch(() => console.log("Автовоспроизведение заблокировано"));
        }

        // --- КОМАНДА ---
        async function renderTeam() {
            const grid = document.getElementById('team-grid');
            grid.innerHTML = '';
            const snap = await getDocs(collection(db, "team"));
            snap.forEach(d => {
                const m = d.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="del-btn" style="display:${isAdmin?'block':'none'}">УДАЛИТЬ</button>
                    <img src="${m.img}">
                    <div class="card-content"><b>${m.name}</b><br><small>${m.role}</small></div>
                `;
                if(isAdmin) card.querySelector('.del-btn').onclick = () => deleteItem('team', d.id);
                grid.appendChild(card);
            });
        }

        async function deleteItem(coll, id) {
            if(confirm("Удалить безвозвратно?")) {
                await deleteDoc(doc(db, coll, id));
                location.reload();
            }
        }

        // --- AUTH & PROFILE ---
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'grid';
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    const u = snap.data();
                    isAdmin = u.role === 'admin';
                    document.getElementById('u-nick').innerText = u.nickname;
                    document.getElementById('u-ava').src = u.avatar || `https://api.dicebear.com/7.x/notionists-neutral/svg?seed=${u.nickname}`;
                    document.getElementById('u-views').innerText = u.views || 0;
                    document.getElementById('u-reg').innerText = u.regDate || "--";
                    document.getElementById('u-role-tag').innerText = isAdmin ? "ГЛАВНЫЙ АДМИНИСТРАТОР" : "УЧАСТНИК SWS";
                    document.getElementById('set-nick').value = u.nickname;
                    document.getElementById('set-ava').value = u.avatar || "";
                    if(isAdmin) document.getElementById('admin-panel').style.display = 'block';
                    
                    const ach = document.getElementById('u-ach'); ach.innerHTML = '';
                    if(isAdmin) ach.innerHTML += `<span class="badge gold">🛡️ Основатель</span>`;
                    u.achievements?.forEach(a => ach.innerHTML += `<span class="badge">${a}</span>`);
                }
            } else {
                document.getElementById('auth-ui').style.display = 'block';
                document.getElementById('user-ui').style.display = 'none';
            }
            renderHome();
        });

        document.getElementById('btn-login').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert("Ошибка входа"));
        };

        document.getElementById('btn-reg').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), {
                    nickname: email.split('@')[0], avatar: "", role: "user",
                    views: 0, regDate: new Date().toLocaleDateString('ru-RU'),
                    achievements: ["🚀 Новичок"]
                });
                alert("Успешная регистрация!");
            } catch (e) { alert(e.message); }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        document.getElementById('btn-save-p').onclick = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                nickname: document.getElementById('set-nick').value,
                avatar: document.getElementById('set-ava').value
            });
            alert("Данные обновлены!");
        };

        // --- ADMIN ACTIONS ---
        document.getElementById('btn-add-rel').onclick = async () => {
            await addDoc(collection(db, "projects"), {
                title: document.getElementById('ad-title').value,
                type: document.getElementById('ad-type').value,
                img: document.getElementById('ad-img').value,
                video: document.getElementById('ad-video').value,
                desc: document.getElementById('ad-desc').value,
                time: Date.now()
            });
            alert("Релиз добавлен!"); renderHome();
        };

        document.getElementById('btn-add-mem').onclick = async () => {
            await addDoc(collection(db, "team"), {
                name: document.getElementById('ad-m-name').value,
                role: document.getElementById('ad-m-role').value,
                img: document.getElementById('ad-m-img').value
            });
            alert("Участник добавлен!"); renderTeam();
        };

    </script>
</body>
</html>
