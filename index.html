<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Wave Studio — My Dubside Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root{--bg:#0b0b0d;--card-bg:#141417;--input-bg:#050506;--accent:#ff2e2e;--text:#fff;--text-dim:#9ca3af;--border:#252529;--admin:#3897f0;--ts:all 0.2s ease}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
        body{background:var(--bg);color:var(--text);overflow-x:hidden}
        .container{max-width:1200px;margin:0 auto;padding:0 20px}
        header{padding:20px 0;background:rgba(11,11,13,0.8);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
        .nav-flex{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:22px;font-weight:900;text-transform:uppercase;cursor:pointer}
        .logo span{color:var(--accent)}
        .nav-menu{display:flex;gap:30px;align-items:center}
        .nav-link{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);transition:var(--ts);cursor:pointer}
        .nav-link:hover,.nav-link.active{color:var(--accent)}
        .btn-auth{background:var(--accent);color:#fff;padding:10px 20px;border-radius:8px;font-weight:900;font-size:11px;text-transform:uppercase;border:none;cursor:pointer}
        .search-box{width:100%;max-width:500px;position:relative}
        .search-box input{width:100%;padding:12px 20px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:13px}
        .releases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:25px;margin-top:30px}
        .card{background:var(--card-bg);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:var(--ts);cursor:pointer;position:relative}
        .card:hover{transform:translateY(-5px);border-color:var(--accent)}
        .card-img{width:100%;aspect-ratio:16/10;object-fit:cover}
        .card-body{padding:20px}
        .card-tag{font-size:9px;font-weight:900;color:var(--accent);text-transform:uppercase;margin-bottom:8px;display:block}
        .card-title{font-size:16px;font-weight:800;line-height:1.4}
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal-content{background:var(--card-bg);padding:40px;border-radius:24px;width:100%;max-width:450px;border:1px solid var(--border)}
        .hidden{display:none!important}
        #player-area{background:#000;border-radius:20px;aspect-ratio:16/9;margin:30px 0;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);overflow:hidden}
        .ep-btn{padding:12px 20px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:#fff;cursor:pointer;font-weight:800;font-size:12px;transition:var(--ts)}
        .ep-btn.active{border-color:var(--accent);color:var(--accent)}
        .mention-link{color:var(--accent);text-decoration:none;font-weight:bold}
    </style>
</head>
<body>
    <header>
        <div class="container nav-flex">
            <div class="logo" onclick="navigate('home')">SOUND WAVE <span>STUDIO</span></div>
            <nav class="nav-menu">
                <div class="nav-link active" data-page="home" onclick="navigate('home')">Релизы</div>
                <div class="nav-link" data-page="team" onclick="navigate('team')">Команда</div>
                <div class="nav-link" data-page="dubin" onclick="navigate('dubin')">DUB-IN</div>
                <div id="adm-nav" class="nav-link hidden" onclick="navigate('admin')">ADMIN</div>
                <div id="auth-ui"><button class="btn-auth" onclick="openModal('m-auth')">Вход</button></div>
                <div id="user-ui" class="hidden" onclick="navigate('profile')" style="cursor:pointer;display:flex;align-items:center;gap:12px">
                    <div style="text-align:right"><div id="u-nick" style="font-size:12px;font-weight:900">User</div><div id="u-role" style="font-size:9px;color:var(--accent);font-weight:900">UNIT</div></div>
                    <img id="u-ava" src="" style="width:35px;height:35px;border-radius:8px;border:1px solid var(--accent)">
                </div>
            </nav>
        </div>
    </header>

    <main id="app">
        <section id="s-home" class="page container">
            <div style="padding:60px 0;text-align:center">
                <h1 style="font-size:35px;font-weight:900">MY <span style="color:var(--accent)">DUBSIDE</span></h1>
                <div class="search-box" style="margin:30px auto">
                    <input type="text" id="main-search" placeholder="Поиск релизов...">
                </div>
                <div id="filter-bar" style="display:flex;justify-content:center;gap:10px;margin-bottom:20px">
                    <button class="ep-btn active" onclick="filterReleases('All')">Все</button>
                    <button class="ep-btn" onclick="filterReleases('Аниме')">Аниме</button>
                    <button class="ep-btn" onclick="filterReleases('Фильм')">Фильмы</button>
                    <button class="ep-btn" onclick="filterReleases('Тизер')">Тизеры</button>
                    <button class="ep-btn" onclick="filterReleases('Трейлер')">Трейлеры</button>
                </div>
            </div>
            <div id="releases-grid" class="releases-grid"></div>
        </section>

        <section id="s-view" class="page container hidden">
            <div id="view-content" style="padding:40px 0"></div>
        </section>

        <section id="s-admin" class="page container hidden">
            <div style="padding:40px 0;display:flex;justify-content:space-between;align-items:center">
                <h2>Управление контентом</h2>
                <button class="btn-auth" onclick="openModal('m-add-rel')">Добавить релиз</button>
            </div>
            <div id="admin-list" style="display:flex;flex-direction:column;gap:10px"></div>
        </section>

        <section id="s-profile" class="page container hidden">
            <div id="profile-area" style="padding:60px 0"></div>
        </section>
    </main>

    <div id="m-auth" class="modal" onclick="if(event.target==this)closeModal('m-auth')">
        <div class="modal-content">
            <h2 id="atitle" style="text-align:center;margin-bottom:25px">АВТОРИЗАЦИЯ</h2>
            <input type="email" id="aemail" placeholder="EMAIL">
            <input type="password" id="apass" placeholder="PASSWORD">
            <button class="btn-auth" style="width:100%;padding:15px" onclick="handleAuth()">Продолжить</button>
            <p id="aswitch" onclick="toggleAuth()" style="text-align:center;margin-top:20px;font-size:11px;color:var(--text-dim);cursor:pointer">НЕТ АККАУНТА? РЕГИСТРАЦИЯ</p>
        </div>
    </div>

    <div id="m-add-rel" class="modal" onclick="if(event.target==this)closeModal('m-add-rel')">
        <div class="modal-content" style="max-width:600px">
            <h2>Новый проект</h2>
            <input type="text" id="rtitle" placeholder="Название">
            <select id="rgenre"><option value="Аниме">Аниме</option><option value="Фильм">Фильм</option><option value="Тизер">Тизер</option><option value="Трейлер">Трейлер</option></select>
            <input type="text" id="ryear" placeholder="Год">
            <input type="text" id="rimg" placeholder="URL обложки">
            <textarea id="rdesc" placeholder="Описание" style="width:100%;height:100px;padding:12px;background:var(--input-bg);border:1px solid var(--border);color:#fff;border-radius:12px;margin-bottom:15px"></textarea>
            <textarea id="reps" placeholder="Название серии|ссылка (через запятую)" style="width:100%;height:80px;padding:12px;background:var(--input-bg);border:1px solid var(--border);color:#fff;border-radius:12px;margin-bottom:15px"></textarea>
            <button class="btn-auth" style="width:100%" onclick="saveRelease()">Опубликовать</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, getDocs, doc, deleteDoc, query, where, orderBy, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "ВАШ_API_KEY", authDomain: "ВАШ_DOMAIN", projectId: "ВАШ_PROJECT_ID", storageBucket: "ВАШ_BUCKET", messagingSenderId: "ВАШ_SENDER", appId: "ВАШ_APP_ID" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let state = { user: null, profile: null, mode: 'login', currentFilter: 'All' };

        // Навигация
        window.navigate = (p) => {
            document.querySelectorAll('.page').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('s-' + p).classList.remove('hidden');
            const link = document.querySelector(`[data-page="${p}"]`);
            if(link) link.classList.add('active');
            if(p === 'profile') renderProfile();
        };

        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.toggleAuth = () => {
            state.mode = state.mode === 'login' ? 'reg' : 'login';
            document.getElementById('atitle').innerText = state.mode === 'login' ? 'АВТОРИЗАЦИЯ' : 'РЕГИСТРАЦИЯ';
            document.getElementById('aswitch').innerText = state.mode === 'login' ? 'НЕТ АККАУНТА? РЕГИСТРАЦИЯ' : 'ЕСТЬ АККАУНТ? ВХОД';
        };

        window.handleAuth = async () => {
            const e = document.getElementById('aemail').value, p = document.getElementById('apass').value;
            try {
                if(state.mode === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    await setDoc(doc(db, "users", res.user.uid), { uid: res.user.uid, nick: e.split('@')[0], role: 'User', ava: 'https://api.dicebear.com/7.x/bottts/svg?seed=' + res.user.uid, views: 0, subs: 0 });
                }
                closeModal('m-auth');
            } catch (err) { alert(err.message); }
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                state.user = u;
                const snap = await getDoc(doc(db, "users", u.uid));
                state.profile = snap.data();
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('user-ui').classList.remove('hidden');
                document.getElementById('u-nick').innerText = state.profile.nick;
                document.getElementById('u-ava').src = state.profile.ava;
                document.getElementById('u-role').innerText = state.profile.role.toUpperCase();
                if(state.profile.role === 'Admin') document.getElementById('adm-nav').classList.remove('hidden');
            } else {
                state.user = null;
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('user-ui').classList.add('hidden');
                document.getElementById('adm-nav').classList.add('hidden');
            }
        });

        // Загрузка релизов с фильтром
        window.filterReleases = (f) => {
            state.currentFilter = f;
            document.querySelectorAll('#filter-bar .ep-btn').forEach(b => b.classList.toggle('active', b.innerText === f || (f === 'All' && b.innerText === 'Все')));
            loadReleases();
        };

        function loadReleases() {
            const qRel = state.currentFilter === 'All' ? query(collection(db, "releases"), orderBy("title")) : query(collection(db, "releases"), where("genre", "==", state.currentFilter));
            onSnapshot(qRel, (snap) => {
                const grid = document.getElementById('releases-grid'), adm = document.getElementById('admin-list');
                grid.innerHTML = ""; adm.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    grid.innerHTML += `<div class="card" onclick="openView('${d.id}')"><img src="${r.img}" class="card-img"><div class="card-body"><span class="card-tag">${r.genre}</span><h3 class="card-title">${r.title}</h3><p style="font-size:11px;color:var(--text-dim);margin-top:5px">${r.year} • SWS DUB</p></div></div>`;
                    adm.innerHTML += `<div style="background:var(--card-bg);padding:15px;border-radius:12px;display:flex;justify-content:space-between;border:1px solid var(--border)"><span>${r.title}</span><i class="fas fa-trash" style="color:var(--accent);cursor:pointer" onclick="deleteRel('${d.id}')"></i></div>`;
                });
            });
        }
        loadReleases();

        // Просмотр релиза + Комментарии с упоминаниями
        window.openView = async (id) => {
            const snap = await getDoc(doc(db, "releases", id)), r = snap.data();
            navigate('view');
            const view = document.getElementById('view-content');
            view.innerHTML = `<div style="display:grid;grid-template-columns:300px 1fr;gap:40px"><img src="${r.img}" style="width:100%;border-radius:20px;border:1px solid var(--border)"><div><span class="card-tag">${r.genre}</span><h1 style="font-size:40px;margin:10px 0">${r.title}</h1><p style="color:var(--text-dim);line-height:1.6">${r.desc}</p><div id="player-area">ВЫБЕРИТЕ СЕРИЮ</div><div id="ep-list" style="display:flex;gap:10px;flex-wrap:wrap"></div><div id="comm-area" style="margin-top:50px"></div></div></div>`;
            
            const epList = document.getElementById('ep-list');
            r.episodes.split(',').forEach(e => {
                const [n, u] = e.split('|');
                const b = document.createElement('button'); b.className = 'ep-btn'; b.innerText = n;
                b.onclick = () => {
                    document.querySelectorAll('.ep-btn').forEach(x => x.classList.remove('active')); b.classList.add('active');
                    document.getElementById('player-area').innerHTML = `<iframe src="${u.trim()}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
                };
                epList.appendChild(b);
            });
            renderComments(id);
        };

        function renderComments(relId) {
            const area = document.getElementById('comm-area');
            area.innerHTML = `<h3>Комментарии</h3><div id="clist" style="margin:20px 0;display:flex;flex-direction:column;gap:15px"></div>` + (state.user ? `<textarea id="ctext" placeholder="Напишите @email чтобы упомянуть..." style="width:100%;height:80px;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;color:#fff;padding:15px"></textarea><button class="btn-auth" style="margin-top:10px" onclick="postComment('${relId}')">Отправить</button>` : '');
            
            onSnapshot(query(collection(db, "comments"), where("relId", "==", relId), orderBy("date", "desc")), (snap) => {
                const list = document.getElementById('clist'); list.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const formattedText = c.text.replace(/@(\S+@\S+\.\S+)/g, '<a href="#" class="mention-link">@$1</a>');
                    list.innerHTML += `<div style="display:flex;gap:15px;background:rgba(255,255,255,0.02);padding:15px;border-radius:15px"><img src="${c.ava}" style="width:40px;height:40px;border-radius:8px"><div><div style="font-size:12px;font-weight:900">${c.nick} <span style="color:var(--accent);font-size:9px">${c.role}</span></div><p style="font-size:14px;color:var(--text-dim);margin-top:5px">${formattedText}</p></div></div>`;
                });
            });
        }

        window.postComment = async (relId) => {
            const t = document.getElementById('ctext').value; if(!t.trim()) return;
            await addDoc(collection(db, "comments"), { relId, text: t, nick: state.profile.nick, ava: state.profile.ava, role: state.profile.role, date: new Date().toISOString() });
            document.getElementById('ctext').value = "";
        };

        window.saveRelease = async () => {
            await addDoc(collection(db, "releases"), { title: document.getElementById('rtitle').value, genre: document.getElementById('rgenre').value, year: document.getElementById('ryear').value, img: document.getElementById('rimg').value, desc: document.getElementById('rdesc').value, episodes: document.getElementById('reps').value });
            closeModal('m-add-rel');
        };

        window.deleteRel = async (id) => { if(confirm('Удалить?')) await deleteDoc(doc(db, "releases", id)); };

        window.renderProfile = () => {
            document.getElementById('profile-area').innerHTML = `<div style="max-width:600px;margin:0 auto;background:var(--card-bg);padding:40px;border-radius:24px;text-align:center;border:1px solid var(--border)"><img src="${state.profile.ava}" style="width:120px;border-radius:20px;border:2px solid var(--accent);margin-bottom:20px"><h2>${state.profile.nick}</h2><p style="color:var(--accent);font-weight:900">${state.profile.role.toUpperCase()}</p><div style="display:flex;gap:10px;margin-top:30px"><div style="flex:1;background:var(--bg);padding:15px;border-radius:12px"><b>${state.profile.views}</b><br><small>Просмотры</small></div><div style="flex:1;background:var(--bg);padding:15px;border-radius:12px"><b>${state.profile.subs}</b><br><small>Подписки</small></div></div><button class="btn-auth" style="margin-top:30px;background:#222" onclick="auth.signOut().then(()=>location.reload())">ВЫЙТИ</button></div>`;
        };

        document.getElementById('main-search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            document.querySelectorAll('#releases-grid .card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? 'block' : 'none');
        };
    </script>
</body>
</html>
