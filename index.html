<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWS | Sound Wave Studio</title>
    <style>
        :root {
            --bg-color: #0d0d0f;
            --surface-color: #16161a;
            --primary-color: #ff3c3c; /* Яркий красный */
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; }

        /* --- Навигация --- */
        header {
            background-color: rgba(13, 13, 15, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--primary-color); }

        nav ul { list-style: none; display: flex; gap: 25px; }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: var(--transition);
            cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--primary-color); }

        /* --- Секции --- */
        .section { display: none; padding: 4rem 5%; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .center-wrap { text-align: center; margin-bottom: 3rem; }
        h2.section-title { font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        h2.section-title::after { content: ''; display: block; width: 50px; height: 3px; background: var(--primary-color); margin: 10px auto; }

        /* --- Сетка --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .card {
            background: var(--surface-color);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: var(--transition);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-color); box-shadow: 0 10px 30px rgba(255, 60, 60, 0.1); }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .card-info { padding: 15px; }

        /* --- Формы --- */
        .auth-container {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: 15px;
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #222;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            background: #0d0d0f;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            outline: none;
        }
        input:focus { border-color: var(--primary-color); }

        .btn {
            background: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition);
            margin-bottom: 10px;
        }
        .btn:hover { filter: brightness(1.2); }
        .btn-alt { background: transparent; border: 1px solid #444; color: var(--text-muted); }
        .btn-alt:hover { border-color: var(--text-main); color: var(--text-main); }

        .error-msg { color: var(--primary-color); font-size: 0.8rem; margin-bottom: 15px; display: none; text-align: center; }

        /* Плеер */
        .player-box { background: #000; aspect-ratio: 16/9; width: 100%; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <a class="logo" onclick="switchTab('home')">SOUND<span>WAVE</span> STUDIO</a>
        <nav>
            <ul>
                <li><a id="nav-home" class="nav-link active" onclick="switchTab('home')">Тайтлы</a></li>
                <li><a id="nav-team" class="nav-link" onclick="switchTab('team')">Актеры</a></li>
                <li><a id="nav-profile" class="nav-link" onclick="switchTab('profile')">Профиль</a></li>
            </ul>
        </nav>
    </header>

    <main id="home" class="section active">
        <div class="center-wrap"><h2 class="section-title">Каталог Релизов</h2></div>
        <div class="grid">
            <div class="card" onclick="openPlayer('Магическая Битва')">
                <img src="https://m.media-amazon.com/images/M/MV5BNGY4MTg3NzgtMmFkZi00NTg5LWExYjMtNmYwMzNlYWNlYzE1XkEyXkFqcGdeQXVyMjQwMDg0Ng@@._V1_.jpg" alt="Anime">
                <div class="card-info"><b>Магическая Битва</b><br><small>Sound Wave Studio Dub</small></div>
            </div>
        </div>
    </main>

    <main id="player" class="section">
        <div class="center-wrap"><h2 class="section-title" id="titleName">Просмотр</h2></div>
        <div class="auth-container" style="max-width: 900px;">
            <div class="player-box">
                <iframe id="videoPlayer" src="" allowfullscreen></iframe>
            </div>
            <button class="btn btn-alt" onclick="switchTab('home')">Закрыть плеер</button>
        </div>
    </main>

    <main id="profile" class="section">
        <div id="auth-ui" class="auth-container">
            <h3 id="auth-title" style="margin-bottom: 20px; text-align: center;">Вход в SWS</h3>
            <p id="auth-error" class="error-msg"></p>
            
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            
            <button id="btn-login" class="btn">Войти</button>
            <button id="btn-register" class="btn btn-alt">Создать аккаунт</button>
        </div>

        <div id="user-ui" class="auth-container" style="display: none; text-align: center;">
            <h3 id="welcome-user">Добро пожаловать!</h3>
            <p id="role-tag" style="margin: 10px 0; color: var(--primary-color); font-weight: bold;"></p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            
            <div id="admin-tools" style="display: none;">
                <p>Панель управления SWS</p><br>
                <button class="btn" onclick="alert('Функция в разработке: Firestore integration')">Добавить Тайтл</button>
            </div>
            
            <button id="btn-logout" class="btn btn-alt" style="margin-top: 20px;">Выйти</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDVKjnhK6i6Y7iT-OA24ccRbLKp7EY22Ug",
            authDomain: "my-dub-site.firebaseapp.com",
            projectId: "my-dub-site",
            storageBucket: "my-dub-site.firebasestorage.app",
            messagingSenderId: "302896869866",
            appId: "1:302896869866:web:a003a8f24d682cb3ac0293"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Элементы
        const btnLogin = document.getElementById('btn-login');
        const btnReg = document.getElementById('btn-register');
        const btnLogout = document.getElementById('btn-logout');
        const authError = document.getElementById('auth-error');

        // Функция переключения вкладок
        window.switchTab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
        };

        window.openPlayer = (name) => {
            document.getElementById('titleName').innerText = name;
            document.getElementById('videoPlayer').src = "https://kodik.info/serial/32686/353406214f4949f506240294e07a688d/720p"; 
            switchTab('player');
        };

        // РЕГИСТРАЦИЯ
        btnReg.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            authError.style.display = 'none';

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // Создаем запись в базе данных для роли
                await setDoc(doc(db, "users", res.user.uid), {
                    email: email,
                    role: "user" // По умолчанию все - обычные юзеры
                });
                alert("Аккаунт создан!");
            } catch (err) {
                authError.innerText = "Ошибка регистрации: " + err.message;
                authError.style.display = 'block';
            }
        });

        // ВХОД
        btnLogin.addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            authError.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                authError.innerText = "Ошибка: " + err.message;
                authError.style.display = 'block';
            }
        });

        // ВЫХОД
        btnLogout.addEventListener('click', () => signOut(auth));

        // СЛЕЖКА ЗА СОСТОЯНИЕМ
        onAuthStateChanged(auth, async (user) => {
            const authUI = document.getElementById('auth-ui');
            const userUI = document.getElementById('user-ui');
            
            if (user) {
                authUI.style.display = 'none';
                userUI.style.display = 'block';
                document.getElementById('welcome-user').innerText = `Профиль: ${user.email}`;
                
                // Проверяем роль
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const role = snap.data().role;
                    document.getElementById('role-tag').innerText = role === 'admin' ? "АДМИНИСТРАТОР SWS" : "ЗРИТЕЛЬ";
                    if(role === 'admin') document.getElementById('admin-tools').style.display = 'block';
                }
            } else {
                authUI.style.display = 'block';
                userUI.style.display = 'none';
                document.getElementById('admin-tools').style.display = 'none';
            }
        });
    </script>
</body>
</html>
