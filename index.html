<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sound Wave Studio — Профессиональная озвучка и дубляж</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <meta name="description" content="Студия фандаба Sound Wave Studio: качественный дубляж, озвучка сериалов, фильмов, мультфильмов и аниме. Узнайте наш состав и следите за новыми релизами!">
    <meta name="keywords" content="Sound Wave Studio, озвучка, дубляж, СВС, SWS, фандаб, аниме озвучка">

    <meta property="og:title" content="Sound Wave Studio">
    <meta property="og:description" content="Твоя любимая озвучка здесь. Заходи на официальный сайт!">
    <meta property="og:image" content="https://soundwavestudio-dub.ru/favicon.png">
    <meta property="og:url" content="https://soundwavestudio-dub.ru">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg: #0b0b0d;
            --card-bg: #141417;
            --input-bg: #050506;
            --accent: #ff2e2e;
            --text: #ffffff;
            --text-dim: #9ca3af;
            --border: #252529;
            --admin: #3897f0;
            --ts: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 15px; flex: 1; }

        header { 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(12px);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        
        nav { display: flex; gap: 15px; }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 13px; padding: 8px 10px; cursor: pointer; transition: var(--ts); }
        .nav-link:hover { color: white; }
        .nav-link.active { color: var(--accent); }

        .search-bar { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; margin-top: 10px; }
        input, select, textarea { 
            flex: 1; padding: 12px 15px; background: var(--input-bg); border: 1px solid var(--border); 
            color: white; border-radius: 8px; outline: none; font-size: 14px; transition: var(--ts);
        }
        input:focus { border-color: var(--accent); }
        .filter-select { width: auto; min-width: 140px; cursor: pointer; }

        .section { display: none; padding: 20px 0; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
            position: relative; transition: var(--ts); cursor: pointer; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-3px); border-color: #444; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-info { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .tag { font-size: 9px; background: var(--accent); padding: 2px 6px; border-radius: 4px; display: inline-block; width: fit-content; font-weight: 800; color: white; }
        .year-tag { font-size: 9px; background: #333; padding: 2px 6px; border-radius: 4px; display: inline-block; width: fit-content; color: white; }

        /* PLAYER & VIEW */
        .view-header { display: flex; gap: 20px; background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        .v-poster { width: 220px; height: 320px; border-radius: 10px; flex-shrink: 0; object-fit: cover; border: 1px solid var(--border); }
        .v-details { flex: 1; }
        @media (max-width: 700px) { 
            .view-header { flex-direction: column; align-items: center; text-align: center; } 
            .v-poster { width: 180px; height: 260px; }
        }
        
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; padding: 25px; border-radius: 16px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; font-size: 12px; transition: var(--ts); display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-blue { background: var(--admin); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
        .btn-sm { padding: 6px 10px; font-size: 10px; }

        /* COMMENTS */
        .comm-item { display: flex; gap: 12px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .comm-ava { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }

        footer { padding: 40px 0; border-top: 1px solid var(--border); margin-top: 40px; text-align: center; }
        .soc-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .soc-links a { color: white; font-size: 20px; transition: 0.3s; opacity: 0.6; }
        .soc-links a:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="loadHome()">Sound Wave <span>Studio</span></div>
    <nav>
        <span class="nav-link active" onclick="loadHome()">Главная</span>
        <span class="nav-link" onclick="showSection('team')">Состав</span>
        <span class="nav-link" id="adm-btn-add" style="display:none" onclick="openAddModal()">Добавить релиз</span>
        <span class="nav-link" id="adm-btn-team" style="display:none" onclick="openTeamModal()">Управление составом</span>
    </nav>
</header>

<div class="container">
    <div id="home" class="section active">
        <div class="search-bar">
            <input type="text" id="search-q" placeholder="Поиск по названию..." oninput="renderReleases()">
            <select class="filter-select" id="filter-type" onchange="renderReleases()">
                <option value="">Все типы</option>
                <option value="Аниме">Аниме</option>
                <option value="Фильм">Фильм</option>
                <option value="Сериал">Сериал</option>
                <option value="Трейлер">Трейлер</option>
                <option value="Тизер">Тизер</option>
            </select>
        </div>
        <div class="grid" id="releases-grid"></div>
    </div>

    <div id="view" class="section">
        <div id="view-content"></div>
        <div class="video-box" id="player-container"></div>
        
        <div class="comments" style="margin-top: 30px;">
            <h3>Комментарии</h3>
            <div id="comm-auth-msg" style="display:none; padding: 20px; text-align: center; color: var(--text-dim);">
                Войдите, чтобы оставить отзыв
            </div>
            <div id="comm-form" style="margin-top: 15px;">
                <textarea id="comm-text" style="height: 80px;" placeholder="Ваш комментарий..."></textarea>
                <button class="btn" onclick="sendComment()">Отправить</button>
            </div>
            <div id="comments-list"></div>
        </div>
    </div>

    <div id="team" class="section">
        <h2 style="margin-bottom: 20px;">Наш Состав</h2>
        <div class="grid" id="team-grid"></div>
    </div>

    <div id="auth-panel" style="margin-top: 40px; background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border);">
        <div id="auth-ui">
            <h3 style="margin-bottom: 20px;">Личный кабинет</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn" id="btn-login">Войти</button>
                <button class="btn btn-outline" id="btn-reg">Регистрация</button>
            </div>
        </div>

        <div id="user-ui" style="display:none">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px;">
                <img id="user-ava" class="comm-ava" style="width: 80px; height: 80px;" src="https://i.pinimg.com/736x/8b/16/7a/8b167af653c2399dd93b952a48740620.jpg">
                <div>
                    <h2 id="user-nick">Никнейм</h2>
                    <p id="user-role-tag" style="color: var(--accent); font-weight: 800; font-size: 12px; margin-bottom: 5px;"></p>
                    <div id="user-stats" style="font-size: 12px; color: var(--text-dim);"></div>
                </div>
            </div>

            <div id="adm-ach-panel" style="display:none; padding: 15px; background: rgba(56, 151, 240, 0.05); border: 1px solid var(--admin); border-radius: 10px; margin-bottom: 20px;">
                <p style="font-size: 11px; margin-bottom: 10px;"><b>ВЫДАЧА ДОСТИЖЕНИЙ (ADMIN)</b></p>
                <input type="text" id="target-uid" placeholder="UID пользователя" style="margin-bottom: 5px;">
                <input type="text" id="ach-name" placeholder="Название ачивки" style="margin-bottom: 5px;">
                <button class="btn btn-blue btn-sm" onclick="giveAchievement()">Выдать</button>
            </div>

            <div id="user-achievements" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;"></div>
            <button class="btn btn-outline" id="btn-logout">Выйти из системы</button>
        </div>
    </div>
</div>

<footer>
    <div class="soc-links">
        <a href="#"><i class="fab fa-vk"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
    <p style="font-size: 12px; color: var(--text-dim);">© 2024-2026 <b>Sound Wave Studio</b>. All rights reserved.</p>
</footer>

<div class="modal" id="modal-add">
    <div class="modal-content">
        <h3>Добавить новый релиз</h3><br>
        <input type="text" id="add-title" placeholder="Название проекта">
        <input type="text" id="add-img" placeholder="URL постера">
        <input type="text" id="add-year" placeholder="Год выпуска">
        <select id="add-type">
            <option value="Аниме">Аниме</option>
            <option value="Фильм">Фильм</option>
            <option value="Сериал">Сериал</option>
            <option value="Трейлер">Трейлер</option>
            <option value="Тизер">Тизер</option>
        </select>
        <textarea id="add-desc" placeholder="Краткое описание" style="height: 100px;"></textarea>
        <input type="text" id="add-player" placeholder="Iframe код плеера">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" onclick="saveRelease()">Сохранить</button>
            <button class="btn btn-outline" onclick="closeModals()">Закрыть</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-team">
    <div class="modal-content">
        <h3>Добавить участника</h3><br>
        <input type="text" id="t-name" placeholder="Никнейм">
        <input type="text" id="t-role" placeholder="Роль (Даббер, Технарь...)">
        <input type="text" id="t-img" placeholder="URL фото">
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="saveMember()">Добавить</button>
            <button class="btn btn-outline" onclick="closeModals()">Закрыть</button>
        </div>
    </div>
</div>

<script type="module">
    // ИНИЦИАЛИЗАЦИЯ FIREBASE (ТВОЯ ВЕРСИЯ БЕЗ ИЗМЕНЕНИЙ)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, arrayRemove, collection, onSnapshot, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD34TTNdG1V4SZmuQ1ULVdo3iBB3q-7pC8",
        authDomain: "my-dub-site.firebaseapp.com",
        projectId: "my-dub-site",
        storageBucket: "my-dub-site.appspot.com",
        messagingSenderId: "374261778949",
        appId: "1:374261778949:web:53a6c561a067644265cc88"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentViewId = null;

    // СИСТЕМНАЯ ЛОГИКА
    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => {
            l.classList.remove('active');
            if(l.getAttribute('onclick')?.includes(id)) l.classList.add('active');
        });
        window.scrollTo(0, 0);
    };

    window.loadHome = () => showSection('home');
    window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    window.openAddModal = () => document.getElementById('modal-add').style.display = 'flex';
    window.openTeamModal = () => document.getElementById('modal-team').style.display = 'flex';

    // РЕЛИЗЫ (ТВОЙ ПОЛНЫЙ ФУНКЦИОНАЛ)
    let allReleases = [];
    onSnapshot(collection(db, "releases"), (snap) => {
        allReleases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderReleases();
    });

    window.renderReleases = () => {
        const q = document.getElementById('search-q').value.toLowerCase();
        const type = document.getElementById('filter-type').value;
        const grid = document.getElementById('releases-grid');
        grid.innerHTML = '';

        allReleases.filter(r => r.title.toLowerCase().includes(q) && (type === '' || r.type === type)).forEach(r => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${r.img}">
                <div class="card-info">
                    <span class="tag">${r.type}</span>
                    <span class="year-tag">${r.year}</span>
                    <div style="font-weight:700; margin-top:5px; line-height:1.2;">${r.title}</div>
                </div>`;
            div.onclick = () => openRelease(r.id);
            grid.appendChild(div);
        });
    };

    window.saveRelease = async () => {
        const data = {
            title: document.getElementById('add-title').value,
            img: document.getElementById('add-img').value,
            year: document.getElementById('add-year').value,
            type: document.getElementById('add-type').value,
            desc: document.getElementById('add-desc').value,
            player: document.getElementById('add-player').value
        };
        await addDoc(collection(db, "releases"), data);
        closeModals();
        alert("Релиз успешно добавлен!");
    };

    window.openRelease = async (id) => {
        const r = allReleases.find(x => x.id === id);
        currentViewId = id;
        
        document.getElementById('view-content').innerHTML = `
            <div class="view-header">
                <img src="${r.img}" class="v-poster">
                <div class="v-details">
                    <h1 style="font-size: 1.8rem; margin-bottom:10px">${r.title}</h1>
                    <div style="margin-bottom:15px">
                        <span class="tag">${r.type}</span>
                        <span class="year-tag">${r.year}</span>
                    </div>
                    <p style="color:var(--text-dim); font-size: 14px; line-height:1.6">${r.desc}</p>
                </div>
            </div>`;
            
        document.getElementById('player-container').innerHTML = r.player || '<div style="padding:40px; text-align:center; opacity:0.5">Контент находится в обработке...</div>';
        
        showSection('view');
        loadComments(id);
        
        // Твоя логика просмотров
        if(auth.currentUser) {
            await updateDoc(doc(db, "users", auth.currentUser.uid), { views: (currentUser.views || 0) + 1 });
        }
    };

    // КОММЕНТАРИИ
    window.loadComments = (relId) => {
        const q = query(collection(db, "releases", relId, "comments"), orderBy("date", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('comments-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                const div = document.createElement('div');
                div.className = 'comm-item';
                div.innerHTML = `
                    <img class="comm-ava" src="https://i.pinimg.com/736x/8b/16/7a/8b167af653c2399dd93b952a48740620.jpg">
                    <div>
                        <div style="font-weight:800; color:var(--accent); font-size:12px;">${c.user}</div>
                        <div style="margin-top:4px; font-size:13px; line-height:1.4">${c.text}</div>
                    </div>`;
                list.appendChild(div);
            });
        });
    };

    window.sendComment = async () => {
        const text = document.getElementById('comm-text').value;
        if(!text || !currentUser) return;
        await addDoc(collection(db, "releases", currentViewId, "comments"), {
            user: currentUser.nickname,
            text: text,
            date: new Date()
        });
        document.getElementById('comm-text').value = '';
    };

    // ПРОФИЛЬ (АЧИВКИ, УРОВНИ, ПОДПИСКИ)
    window.renderAchProfile = () => {
        const achCont = document.getElementById('user-achievements');
        achCont.innerHTML = '';
        if(currentUser.achievements) {
            currentUser.achievements.forEach(a => {
                const s = document.createElement('span');
                s.className = 'tag';
                s.style.background = 'var(--admin)';
                s.innerText = a;
                achCont.appendChild(s);
            });
        }
        
        // Твой расчет уровня
        const level = Math.floor((currentUser.views || 0) / 10) + 1;
        document.getElementById('user-stats').innerHTML = `
            Уровень: <b>${level}</b> | 
            Просмотры: <b>${currentUser.views || 0}</b> | 
            Подписчики: <b>${currentUser.subscribers || 0}</b>`;
    };

    window.giveAchievement = async () => {
        const uid = document.getElementById('target-uid').value;
        const name = document.getElementById('ach-name').value;
        if(!uid || !name) return;
        try {
            await updateDoc(doc(db, "users", uid), { achievements: arrayUnion(name) });
            alert("Достижение выдано!");
        } catch(e) { alert("Ошибка: Проверьте UID"); }
    };

    // СОСТАВ
    onSnapshot(collection(db, "team"), (snap) => {
        const grid = document.getElementById('team-grid');
        grid.innerHTML = '';
        snap.forEach(doc => {
            const m = doc.data();
            grid.innerHTML += `
                <div class="card" style="cursor:default">
                    <img src="${m.img}">
                    <div class="card-info">
                        <div style="font-weight:800">${m.name}</div>
                        <div style="font-size:11px; color:var(--accent); text-transform:uppercase">${m.role}</div>
                    </div>
                </div>`;
        });
    });

    window.saveMember = async () => {
        await addDoc(collection(db, "team"), {
            name: document.getElementById('t-name').value,
            role: document.getElementById('t-role').value,
            img: document.getElementById('t-img').value
        });
        closeModals();
    };

    // АВТОРИЗАЦИЯ (ФИНАЛЬНЫЙ ФИКС)
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                currentUser = snap.data();
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-ui').style.display = 'block';
                document.getElementById('user-nick').innerText = currentUser.nickname;
                document.getElementById('user-role-tag').innerText = currentUser.role === 'admin' ? 'АДМИНИСТРАЦИЯ SWS' : 'УЧАСТНИК СООБЩЕСТВА';
                
                if(currentUser.role === 'admin') {
                    document.getElementById('adm-btn-add').style.display = 'block';
                    document.getElementById('adm-btn-team').style.display = 'block';
                    document.getElementById('adm-ach-panel').style.display = 'block';
                }
                renderAchProfile();
            }
            document.getElementById('comm-form').style.display = 'block';
            document.getElementById('comm-auth-msg').style.display = 'none';
        } else {
            currentUser = null;
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('user-ui').style.display = 'none';
            document.getElementById('comm-form').style.display = 'none';
            document.getElementById('comm-auth-msg').style.display = 'block';
        }
    });

    document.getElementById('btn-login').onclick = () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Ошибка: " + err.message));
    };

    document.getElementById('btn-reg').onclick = async () => {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            const r = await createUserWithEmailAndPassword(auth, e, p);
            await setDoc(doc(db, "users", r.user.uid), { 
                email: e, 
                nickname: e.split('@')[0], 
                role: "user", 
                achievements: [], 
                views: 0, 
                subscribers: 0, 
                subscribersList: [] 
            });
            location.reload();
        } catch(err) { alert("Ошибка регистрации: " + err.message); }
    };

    document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

</script>
</body>
</html>
